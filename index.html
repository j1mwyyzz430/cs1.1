<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS: Desert Zombie Survival (Daylight)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Arial', sans-serif; user-select: none; }
        
        /* 準心 */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 24px; height: 24px;
            background: transparent;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: #0f0;
        }
        #crosshair::before { top: 11px; left: 0; width: 24px; height: 2px; } /* 橫線 */
        #crosshair::after { top: 0; left: 11px; width: 2px; height: 24px; } /* 直線 */

        /* HUD */
        #hud {
            position: absolute; bottom: 20px; left: 20px; color: #fff;
            font-size: 20px; text-shadow: 2px 2px 2px #000; z-index: 10;
            display: flex; gap: 20px;
        }
        .hud-item { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 5px; border: 2px solid #555; }
        .hud-label { font-size: 12px; color: #ccc; display: block; margin-bottom: 5px; }
        .hud-value { font-size: 28px; font-weight: bold; color: #ffcc00; }
        .hud-value.low-ammo { color: #f00; animation: blink 0.5s infinite; }

        @keyframes blink { 50% { opacity: 0.5; } }
        
        /* 商店 */
        #shop {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95); border: 3px solid #ffcc00;
            padding: 20px; color: #fff; display: none; z-index: 20;
            width: 600px; text-align: center; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #shop h2 { margin-top: 0; color: #ffcc00; border-bottom: 1px solid #555; padding-bottom: 10px; }
        .shop-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid #444; margin-bottom: 5px;
            font-size: 18px;
        }
        .shop-item:hover { background: rgba(255, 204, 0, 0.1); }
        .shop-btn {
            background: #ffcc00; color: #000; border: none; padding: 8px 20px;
            cursor: pointer; font-weight: bold; font-size: 16px; border-radius: 4px;
        }
        .shop-btn:hover { background: #ffdd44; }
        .shop-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        
        /* 訊息區 */
        #message-area {
            position: absolute; top: 15%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 36px; text-align: center; text-shadow: 2px 2px 4px #000;
            pointer-events: none; z-index: 10; font-weight: bold; width: 100%;
        }
        
        /* Boss 血條 */
        #boss-bar-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 60%; height: 30px; background: #222; border: 3px solid #fff;
            display: none; z-index: 10; box-shadow: 0 0 10px #000;
        }
        #boss-bar-fill {
            width: 100%; height: 100%; background: linear-gradient(90deg, #f00, #800); transition: width 0.1s;
        }
        #boss-label {
            position: absolute; top: 0; left: 0; width: 100%; text-align: center;
            line-height: 30px; color: #fff; font-weight: bold; text-shadow: 1px 1px 2px #000;
        }

        /* 開始畫面 */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #fff; z-index: 30;
        }
        .key { border: 1px solid #fff; padding: 4px 8px; border-radius: 4px; background: #444; color: #ffcc00; font-weight: bold; margin: 0 2px; }
        h1 { color: #ffcc00; font-size: 48px; margin-bottom: 10px; text-shadow: 0 0 10px #ffcc00; }
        
        /* 換彈提示 */
        #reload-msg {
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
            color: #f00; font-size: 20px; font-weight: bold; display: none; text-shadow: 1px 1px 1px #000;
        }
    </style>
    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="crosshair"></div>
    
    <div id="hud">
        <div class="hud-item">
            <span class="hud-label">HP</span>
            <span class="hud-value" id="hp-val">100</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">MONEY</span>
            <span class="hud-value" id="money-val">$0</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">WEAPON</span>
            <span class="hud-value" id="weapon-val">AK-47</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">AMMO</span>
            <span class="hud-value" id="ammo-val">30 / 90</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">LEVEL</span>
            <span class="hud-value" id="level-val">1</span>
        </div>
    </div>

    <div id="reload-msg">RELOADING...</div>

    <div id="boss-bar-container">
        <div id="boss-bar-fill"></div>
        <div id="boss-label">BOSS: TITAN</div>
    </div>

    <div id="message-area"></div>

    <div id="shop">
        <h2>BUY MENU (按 B 關閉)</h2>
        <div class="shop-item">
            <span>AK-47 子彈 (30發)</span>
            <button class="shop-btn" onclick="buyAmmo('ak', 200)">$200</button>
        </div>
        <div class="shop-item">
            <span>M249 機槍 (含子彈)</span>
            <button class="shop-btn" onclick="buyWeapon('m249', 3000)">$3000</button>
        </div>
        <div class="shop-item">
            <span>M249 子彈 (100發)</span>
            <button class="shop-btn" onclick="buyAmmo('m249', 500)">$500</button>
        </div>
        <div class="shop-item">
            <span>RPG 火箭筒 (含5發)</span>
            <button class="shop-btn" onclick="buyWeapon('rpg', 5000)">$5000</button>
        </div>
        <div class="shop-item">
            <span>RPG 火箭彈 (1發)</span>
            <button class="shop-btn" onclick="buyAmmo('rpg', 1000)">$1000</button>
        </div>
        <div class="shop-item">
            <span>醫療包 (+50 HP)</span>
            <button class="shop-btn" onclick="buyHealth(500)">$500</button>
        </div>
    </div>

    <div id="start-screen">
        <h1>CS: DESERT ZOMBIE</h1>
        <p>點擊畫面開始遊戲</p>
        <p>移動: <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span></p>
        <p>換彈: <span class="key">R</span></p>
        <p>射擊: <span class="key">左鍵</span> (按住連射)</p>
        <p>商店: <span class="key">B</span></p>
        <p>切換武器: <span class="key">1</span> <span class="key">2</span> <span class="key">3</span></p>
    </div>

<script>
    // --- 遊戲參數 ---
    const GameState = {
        hp: 100,
        money: 800,
        level: 1,
        isPlaying: false,
        isShopOpen: false,
        isReloading: false,
        lastShotTime: 0,
        zombiesKilled: 0,
        zombiesToSpawn: 10,
        bossActive: false
    };

    // --- 武器數據 (fireRate 越小越快) ---
    const Weapons = {
        ak: { name: "AK-47", damage: 30, fireRate: 90, ammo: 30, maxAmmo: 30, reserve: 90, spread: 0.02, type: 'ray' },
        m249: { name: "M249", damage: 25, fireRate: 70, ammo: 100, maxAmmo: 100, reserve: 200, spread: 0.04, type: 'ray' },
        rpg: { name: "RPG-7", damage: 800, fireRate: 1500, ammo: 1, maxAmmo: 1, reserve: 5, spread: 0.01, type: 'projectile' }
    };
    
    let currentWeaponKey = 'ak';
    let ownedWeapons = ['ak'];

    // --- Three.js 場景設置 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // 天空藍
    scene.fog = new THREE.Fog(0x87CEEB, 10, 80); // 遠處霧氣
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // --- 聲音系統 ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        if (type === 'shoot') {
            if(currentWeaponKey === 'rpg') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 0.5);
                gain.gain.setValueAtTime(0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else {
                // 機槍/步槍聲
                osc.type = 'square';
                osc.frequency.setValueAtTime(120 + Math.random()*50, now);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.1);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            }
        } else if (type === 'reload') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.linearRampToValueAtTime(600, now + 0.2);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
            // 第二段聲音
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.type = 'square';
            osc2.frequency.setValueAtTime(200, now + 1.0);
            gain2.gain.setValueAtTime(0.1, now + 1.0);
            gain2.gain.linearRampToValueAtTime(0, now + 1.1);
            osc2.start(now + 1.0);
            osc2.stop(now + 1.1);
        } else if (type === 'empty') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.start(now);
            osc.stop(now + 0.05);
        } else if (type === 'explosion') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(50, now);
            osc.frequency.exponentialRampToValueAtTime(1, now + 0.8);
            gain.gain.setValueAtTime(1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
            osc.start(now);
            osc.stop(now + 0.8);
        }
    }

    // --- 紋理生成 ---
    function createTexture(color, noise = true) {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = color;
        ctx.fillRect(0, 0, 128, 128);
        if (noise) {
            for (let i = 0; i < 500; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.15})`;
                ctx.fillRect(Math.random() * 128, Math.random() * 128, 2, 2);
            }
        }
        const tex = new THREE.CanvasTexture(canvas);
        tex.magFilter = THREE.NearestFilter;
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        return tex;
    }

    const sandTex = createTexture('#E6C288'); // 亮沙色
    const wallTex = createTexture('#D2B48C'); // 牆壁
    const boxTex = createTexture('#8B5A2B');  // 木箱
    const zombieTex = createTexture('#556B2F'); // 僵尸
    const bossTex = createTexture('#800000'); // Boss

    // --- 地圖構建 ---
    const mapObjects = [];
    
    // 地面
    const floorGeometry = new THREE.PlaneGeometry(200, 200);
    const floorMaterial = new THREE.MeshStandardMaterial({ map: sandTex, roughness: 0.9 });
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    function createBox(x, y, z, w, h, d, material, isWall = false) {
        const geo = new THREE.BoxGeometry(w, h, d);
        const mesh = new THREE.Mesh(geo, material);
        mesh.position.set(x, y + h / 2, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        mapObjects.push(mesh);
        return mesh;
    }

    // Dust 2 簡易佈局
    const wallMat = new THREE.MeshStandardMaterial({ map: wallTex });
    const boxMat = new THREE.MeshStandardMaterial({ map: boxTex });

    // 邊界牆
    createBox(0, 0, -50, 100, 12, 2, wallMat);
    createBox(0, 0, 50, 100, 12, 2, wallMat);
    createBox(-50, 0, 0, 2, 12, 100, wallMat);
    createBox(50, 0, 0, 2, 12, 100, wallMat);

    // 掩體
    createBox(-20, 0, -20, 8, 4, 8, boxMat); 
    createBox(20, 0, 20, 8, 4, 8, boxMat); 
    createBox(-15, 0, 15, 6, 3, 6, boxMat);
    createBox(15, 0, -15, 6, 3, 6, boxMat);
    
    // 中門與牆體
    createBox(0, 0, 0, 20, 8, 4, wallMat); 
    createBox(-30, 0, 10, 4, 6, 20, wallMat); 
    createBox(30, 0, -10, 4, 4, 15, boxMat); 

    // --- 光照系統 (明亮) ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // 強環境光
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 1.0); // 太陽光
    sunLight.position.set(50, 100, 50);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 200;
    sunLight.shadow.camera.left = -60;
    sunLight.shadow.camera.right = 60;
    sunLight.shadow.camera.top = 60;
    sunLight.shadow.camera.bottom = -60;
    scene.add(sunLight);

    // 槍口閃光燈
    const muzzleLight = new THREE.PointLight(0xffaa00, 0, 10);
    muzzleLight.position.set(0.5, -0.5, -1);
    camera.add(muzzleLight);
    scene.add(camera);

    // --- 控制系統 ---
    const controls = {
        moveForward: false, moveBackward: false, moveLeft: false, moveRight: false,
        velocity: new THREE.Vector3(), direction: new THREE.Vector3()
    };
    
    const blocker = document.getElementById('start-screen');
    
    document.addEventListener('click', function () {
        if (!GameState.isPlaying && !GameState.isShopOpen) {
            document.body.requestPointerLock();
        }
    });

    document.addEventListener('pointerlockchange', function () {
        if (document.pointerLockElement === document.body) {
            GameState.isPlaying = true;
            if(!GameState.isShopOpen) blocker.style.display = 'none';
        } else {
            if (!GameState.isShopOpen) {
                GameState.isPlaying = false;
                blocker.style.display = 'flex';
            }
        }
    });

    // 鼠標視角 (修正反轉問題)
    document.addEventListener('mousemove', function (event) {
        if (GameState.isPlaying && !GameState.isShopOpen) {
            // Y 軸旋轉 (左右看)
            camera.rotation.y -= event.movementX * 0.002;
            
            // X 軸旋轉 (上下看)
            // movementY > 0 是向下移動，我們希望視角向下 (X軸增加)
            camera.rotation.x -= event.movementY * 0.002;
            
            // 限制上下視角範圍 (避免翻轉)
            camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
        }
    });

    document.addEventListener('keydown', (event) => {
        switch (event.code) {
            case 'KeyW': controls.moveForward = true; break;
            case 'KeyA': controls.moveLeft = true; break;
            case 'KeyS': controls.moveBackward = true; break;
            case 'KeyD': controls.moveRight = true; break;
            case 'KeyB': toggleShop(); break;
            case 'KeyR': reloadWeapon(); break;
            case 'Digit1': switchWeapon('ak'); break;
            case 'Digit2': switchWeapon('m249'); break;
            case 'Digit3': switchWeapon('rpg'); break;
        }
    });

    document.addEventListener('keyup', (event) => {
        switch (event.code) {
            case 'KeyW': controls.moveForward = false; break;
            case 'KeyA': controls.moveLeft = false; break;
            case 'KeyS': controls.moveBackward = false; break;
            case 'KeyD': controls.moveRight = false; break;
        }
    });

    let isMouseDown = false;
    document.addEventListener('mousedown', (e) => { 
        if(GameState.isPlaying && !GameState.isShopOpen && e.button === 0) isMouseDown = true; 
    });
    document.addEventListener('mouseup', () => { isMouseDown = false; });

    // --- 遊戲邏輯 ---

    // 換彈
    function reloadWeapon() {
        const w = Weapons[currentWeaponKey];
        if (GameState.isReloading || w.ammo === w.maxAmmo || w.reserve <= 0) return;

        GameState.isReloading = true;
        playSound('reload');
        document.getElementById('reload-msg').style.display = 'block';

        // 換彈動畫/延遲
        setTimeout(() => {
            const needed = w.maxAmmo - w.ammo;
            const toAdd = Math.min(needed, w.reserve);
            w.ammo += toAdd;
            w.reserve -= toAdd;
            GameState.isReloading = false;
            document.getElementById('reload-msg').style.display = 'none';
            updateHUD();
        }, 1500);
    }

    // 僵尸類
    const zombies = [];
    class Zombie {
        constructor(isBoss = false) {
            this.isBoss = isBoss;
            this.hp = isBoss ? 3000 : 100;
            this.maxHp = this.hp;
            this.speed = isBoss ? 0.06 : (0.04 + Math.random() * 0.04);
            this.damage = isBoss ? 25 : 5;
            
            const size = isBoss ? 8 : 2;
            const geo = new THREE.BoxGeometry(size, size, size);
            const mat = new THREE.MeshStandardMaterial({ map: isBoss ? bossTex : zombieTex });
            this.mesh = new THREE.Mesh(geo, mat);
            this.mesh.castShadow = true;
            
            let x, z;
            do {
                x = (Math.random() - 0.5) * 90;
                z = (Math.random() - 0.5) * 90;
            } while (Math.abs(x - camera.position.x) < 25 && Math.abs(z - camera.position.z) < 25);

            this.mesh.position.set(x, size/2, z);
            scene.add(this.mesh);
            zombies.push(this);
        }

        update() {
            const dx = camera.position.x - this.mesh.position.x;
            const dz = camera.position.z - this.mesh.position.z;
            const dist = Math.sqrt(dx*dx + dz*dz);

            if (dist > 2) {
                this.mesh.position.x += (dx / dist) * this.speed;
                this.mesh.position.z += (dz / dist) * this.speed;
                this.mesh.lookAt(camera.position.x, this.mesh.position.y, camera.position.z);
            } else {
                if (Math.random() < 0.03) takeDamage(this.damage);
            }
        }

        hit(dmg) {
            this.hp -= dmg;
            
            // 擊退
            const dx = this.mesh.position.x - camera.position.x;
            const dz = this.mesh.position.z - camera.position.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            if (dist > 0) {
                this.mesh.position.x += (dx/dist) * 0.5;
                this.mesh.position.z += (dz/dist) * 0.5;
            }

            // 簡單受傷閃光
            this.mesh.material.emissive.setHex(0xff0000);
            setTimeout(() => { if(this.mesh) this.mesh.material.emissive.setHex(0x000000); }, 50);

            if (this.isBoss) updateBossBar(this.hp, this.maxHp);

            if (this.hp <= 0) this.die();
        }

        die() {
            createBlood(this.mesh.position);
            scene.remove(this.mesh);
            zombies.splice(zombies.indexOf(this), 1);
            GameState.money += this.isBoss ? 5000 : 100;
            GameState.zombiesKilled++;
            updateHUD();
            
            if (this.isBoss) {
                showMessage("BOSS DEFEATED! LEVEL COMPLETE!");
                GameState.bossActive = false;
                document.getElementById('boss-bar-container').style.display = 'none';
                setTimeout(nextLevel, 4000);
            } else if (!GameState.bossActive && GameState.zombiesKilled >= GameState.zombiesToSpawn) {
                if (GameState.level % 3 === 0) { 
                    spawnBoss();
                } else {
                    showMessage("WAVE CLEARED!");
                    setTimeout(nextLevel, 2000);
                }
            }
        }
    }

    // 血跡
    const bloods = [];
    function createBlood(pos) {
        const geo = new THREE.PlaneGeometry(3, 3);
        const mat = new THREE.MeshBasicMaterial({ color: 0x880000, transparent: true, opacity: 0.8, polygonOffset: true, polygonOffsetFactor: -1 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.x = -Math.PI / 2;
        mesh.position.set(pos.x, 0.02, pos.z);
        mesh.rotation.z = Math.random() * Math.PI;
        scene.add(mesh);
        bloods.push(mesh);
        if (bloods.length > 50) {
            const old = bloods.shift();
            scene.remove(old);
        }
    }

    // 火箭彈
    const projectiles = [];
    class Rocket {
        constructor(position, direction) {
            this.mesh = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({ color: 0x333333 }));
            this.mesh.position.copy(position);
            this.velocity = direction.multiplyScalar(2.0);
            scene.add(this.mesh);
            projectiles.push(this);
        }
        update() {
            this.mesh.position.add(this.velocity);
            // 碰撞檢測
            if (this.mesh.position.y < 0 || Math.abs(this.mesh.position.x) > 50 || Math.abs(this.mesh.position.z) > 50) {
                this.explode();
                return;
            }
            for (let z of zombies) {
                if (this.mesh.position.distanceTo(z.mesh.position) < 2) {
                    this.explode();
                    return;
                }
            }
        }
        explode() {
            playSound('explosion');
            // 爆炸效果
            const light = new THREE.PointLight(0xffaa00, 5, 20);
            light.position.copy(this.mesh.position);
            scene.add(light);
            setTimeout(() => scene.remove(light), 150);

            for (let i = zombies.length - 1; i >= 0; i--) {
                const z = zombies[i];
                const dist = this.mesh.position.distanceTo(z.mesh.position);
                if (dist < 12) {
                    z.hit(Weapons.rpg.damage * (1 - dist/12));
                }
            }
            scene.remove(this.mesh);
            projectiles.splice(projectiles.indexOf(this), 1);
        }
    }

    // 射擊
    function shoot() {
        if (GameState.isReloading) return;

        const now = Date.now();
        const weapon = Weapons[currentWeaponKey];
        
        // 檢查射速
        if (now - GameState.lastShotTime < weapon.fireRate) return;
        
        if (weapon.ammo <= 0) {
            playSound('empty');
            reloadWeapon(); // 自動換彈
            GameState.lastShotTime = now + 500; // 防止連續播放空倉聲
            return;
        }

        weapon.ammo--;
        updateHUD();
        playSound('shoot');
        GameState.lastShotTime = now;

        // 槍口閃光
        muzzleLight.intensity = 2;
        setTimeout(() => muzzleLight.intensity = 0, 50);

        // 計算彈道
        const dir = new THREE.Vector3(0, 0, -1);
        dir.applyQuaternion(camera.quaternion);
        dir.x += (Math.random() - 0.5) * weapon.spread;
        dir.y += (Math.random() - 0.5) * weapon.spread;
        dir.z += (Math.random() - 0.5) * weapon.spread;
        dir.normalize();

        if (weapon.type === 'projectile') {
            new Rocket(camera.position, dir);
        } else {
            const raycaster = new THREE.Raycaster(camera.position, dir);
            const intersects = raycaster.intersectObjects(zombies.map(z => z.mesh));
            if (intersects.length > 0) {
                const zombie = zombies.find(z => z.mesh === intersects[0].object);
                if (zombie) zombie.hit(weapon.damage);
            }
        }
        
        // 後坐力 (視角上抬 + 隨機左右)
        camera.rotation.x += 0.002;
        camera.rotation.y += (Math.random() - 0.5) * 0.002;
    }

    function takeDamage(amount) {
        GameState.hp -= amount;
        updateHUD();
        document.body.style.boxShadow = "inset 0 0 100px rgba(255,0,0,0.5)";
        setTimeout(() => document.body.style.boxShadow = "none", 100);
        if (GameState.hp <= 0) gameOver();
    }

    function nextLevel() {
        GameState.level++;
        GameState.zombiesKilled = 0;
        GameState.zombiesToSpawn += 5;
        showMessage(`LEVEL ${GameState.level}`);
        updateHUD();
        if (GameState.level % 3 === 0) showMessage("WARNING: BOSS APPROACHING");
    }

    function spawnBoss() {
        GameState.bossActive = true;
        new Zombie(true);
        document.getElementById('boss-bar-container').style.display = 'block';
        showMessage("BOSS FIGHT!");
    }

    function spawnZombiesLogic() {
        if (GameState.bossActive) return;
        const currentActive = zombies.length;
        const remainingToSpawn = GameState.zombiesToSpawn - GameState.zombiesKilled - currentActive;
        
        if (currentActive < 8 && remainingToSpawn > 0) {
            if (Math.random() < 0.05) new Zombie();
        }
    }

    // 商店與 UI
    function toggleShop() {
        GameState.isShopOpen = !GameState.isShopOpen;
        const shopEl = document.getElementById('shop');
        if (GameState.isShopOpen) {
            shopEl.style.display = 'block';
            document.exitPointerLock();
        } else {
            shopEl.style.display = 'none';
            document.body.requestPointerLock();
        }
    }

    window.buyAmmo = function(wKey, cost) {
        if (GameState.money >= cost) {
            GameState.money -= cost;
            if (wKey === 'rpg') Weapons[wKey].reserve += 2;
            else Weapons[wKey].reserve += (wKey === 'm249' ? 100 : 30);
            updateHUD();
        }
    };

    window.buyWeapon = function(wKey, cost) {
        if (GameState.money >= cost && !ownedWeapons.includes(wKey)) {
            GameState.money -= cost;
            ownedWeapons.push(wKey);
            switchWeapon(wKey);
            updateHUD();
        }
    };

    window.buyHealth = function(cost) {
        if (GameState.money >= cost && GameState.hp < 100) {
            GameState.money -= cost;
            GameState.hp = Math.min(100, GameState.hp + 50);
            updateHUD();
        }
    }

    function switchWeapon(key) {
        if (ownedWeapons.includes(key)) {
            currentWeaponKey = key;
            GameState.isReloading = false;
            document.getElementById('reload-msg').style.display = 'none';
            updateHUD();
        }
    }

    function updateHUD() {
        document.getElementById('hp-val').innerText = Math.floor(GameState.hp);
        document.getElementById('money-val').innerText = '$' + GameState.money;
        const w = Weapons[currentWeaponKey];
        document.getElementById('weapon-val').innerText = w.name;
        
        const ammoEl = document.getElementById('ammo-val');
        ammoEl.innerText = `${w.ammo} / ${w.reserve}`;
        if (w.ammo < w.maxAmmo * 0.3) ammoEl.classList.add('low-ammo');
        else ammoEl.classList.remove('low-ammo');
        
        document.getElementById('level-val').innerText = GameState.level;
    }

    function updateBossBar(hp, max) {
        const pct = Math.max(0, (hp / max) * 100);
        document.getElementById('boss-bar-fill').style.width = pct + '%';
    }

    function showMessage(msg) {
        const el = document.getElementById('message-area');
        el.innerText = msg;
        el.style.opacity = 1;
        setTimeout(() => el.style.opacity = 0, 3000);
    }

    function gameOver() {
        GameState.isPlaying = false;
        document.exitPointerLock();
        alert(`GAME OVER! You reached Level ${GameState.level}`);
        location.reload();
    }

    // --- 主循環 ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);

        if (!GameState.isPlaying) return;

        const delta = clock.getDelta();

        // 移動物理
        controls.velocity.x -= controls.velocity.x * 10.0 * delta;
        controls.velocity.z -= controls.velocity.z * 10.0 * delta;

        controls.direction.z = Number(controls.moveForward) - Number(controls.moveBackward);
        controls.direction.x = Number(controls.moveRight) - Number(controls.moveLeft);
        controls.direction.normalize();

        if (controls.moveForward || controls.moveBackward) controls.velocity.z -= controls.direction.z * 400.0 * delta;
        if (controls.moveLeft || controls.moveRight) controls.velocity.x -= controls.direction.x * 400.0 * delta;

        camera.translateZ(controls.velocity.z * -delta * 0.03); // 前後
        camera.translateX(controls.velocity.x * -delta * 0.03); // 左右
        camera.position.y = 1.7; // 固定高度

        // 邊界限制
        if (camera.position.x > 48) camera.position.x = 48;
        if (camera.position.x < -48) camera.position.x = -48;
        if (camera.position.z > 48) camera.position.z = 48;
        if (camera.position.z < -48) camera.position.z = -48;

        // 連射邏輯
        if (isMouseDown) shoot();

        spawnZombiesLogic();
        zombies.forEach(z => z.update());
        projectiles.forEach(p => p.update());

        renderer.render(scene, camera);
    }

    animate();
    updateHUD();

</script>
</body>
</html>

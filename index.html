<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Survival FPS: Boss Wave (Fixed)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; user-select: none; }
        
        /* UI 層 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* 準心 */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 24px; height: 24px;
            transform: translate(-50%, -50%);
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(0, 255, 0, 0.8); box-shadow: 0 0 4px #0f0; }
        #crosshair::before { top: 11px; left: 0; width: 24px; height: 2px; }
        #crosshair::after { top: 0; left: 11px; width: 2px; height: 24px; }

        /* 頂部 BOSS 血條 */
        #boss-bar-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 60%; height: 30px; background: rgba(0,0,0,0.8); border: 2px solid #500;
            display: none; /* 只有 BOSS 出現時顯示 */
        }
        #boss-hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #880000); transition: width 0.2s; }
        #boss-label { position: absolute; top: -25px; left: 0; color: #f00; font-weight: bold; text-shadow: 1px 1px 0 #000; letter-spacing: 2px; }

        /* 底部資訊欄 */
        #hud-bottom { position: absolute; bottom: 30px; left: 30px; display: flex; gap: 30px; color: #fff; text-shadow: 2px 2px 0 #000; }
        .hud-box { display: flex; flex-direction: column; }
        .hud-label { font-size: 12px; color: #aaa; font-weight: bold; text-transform: uppercase; }
        .hud-value { font-size: 32px; font-weight: 900; letter-spacing: 1px; }
        .c-green { color: #0f0; } .c-yellow { color: #ffcc00; } .c-blue { color: #00ccff; }

        /* 武器欄 */
        #weapon-slots { position: absolute; bottom: 30px; right: 30px; display: flex; gap: 10px; }
        .slot { width: 60px; height: 60px; background: rgba(0,0,0,0.6); border: 2px solid #333; color: #555; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; transition: 0.2s; position: relative; }
        .slot.active { border-color: #0f0; color: #fff; background: rgba(0, 255, 0, 0.1); transform: scale(1.1); }
        .slot.locked { opacity: 0.3; }
        .slot span { font-size: 10px; position: absolute; top: 2px; left: 4px; }
        .w-name { font-size: 12px; }

        /* 波數提示 */
        #wave-announce {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; color: #ff0000; font-weight: 900; text-shadow: 0 0 20px #f00;
            opacity: 0; transition: opacity 1s; pointer-events: none;
        }

        /* 商店介面 */
        #shop-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 600px; background: rgba(10, 10, 15, 0.95); border: 2px solid #ffcc00;
            padding: 20px; display: none; flex-direction: column; color: #fff; pointer-events: auto; z-index: 200;
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.2);
        }
        #shop-menu h2 { margin: 0 0 20px 0; color: #ffcc00; text-align: center; text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .shop-item { background: #222; padding: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; cursor: pointer; transition: 0.2s; }
        .shop-item:hover { background: #333; border-color: #ffcc00; }
        .shop-item button { background: #ffcc00; border: none; padding: 5px 10px; font-weight: bold; cursor: pointer; color: #000; }
        .shop-item button:disabled { background: #555; color: #888; cursor: not-allowed; }
        .close-shop { margin-top: 20px; padding: 10px; background: #c00; color: #fff; border: none; font-weight: bold; cursor: pointer; }

        /* 開始菜單 */
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; z-index: 100; }
        h1 { color: #f00; font-size: 60px; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px #f00; }
        .controls { text-align: left; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .key { display: inline-block; background: #333; padding: 2px 6px; border-radius: 4px; border: 1px solid #666; color: #ffcc00; font-weight: bold; margin: 0 2px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>
        
        <!-- BOSS 血條 -->
        <div id="boss-bar-container">
            <div id="boss-label">⚠️ FINAL BOSS ⚠️</div>
            <div id="boss-hp-bar"></div>
        </div>

        <div id="wave-announce">WAVE 1</div>

        <div id="hud-bottom">
            <div class="hud-box"><span class="hud-label">HEALTH</span><span class="hud-value c-green" id="hp-val">100</span></div>
            <div class="hud-box"><span class="hud-label">ARMOR</span><span class="hud-value c-blue" id="armor-val">0</span></div>
            <div class="hud-box"><span class="hud-label">MONEY</span><span class="hud-value c-yellow" id="money-val">$0</span></div>
            <div class="hud-box"><span class="hud-label">WAVE</span><span class="hud-value" id="wave-val">1</span></div>
        </div>

        <div id="weapon-slots">
            <div class="slot active" id="slot-0"><span>1</span><div class="w-name">RIFLE</div></div>
            <div class="slot locked" id="slot-1"><span>2</span><div class="w-name">M249</div></div>
            <div class="slot locked" id="slot-2"><span>3</span><div class="w-name">RPG</div></div>
        </div>
    </div>

    <!-- 商店 -->
    <div id="shop-menu">
        <h2>Black Market Weaponry</h2>
        <div class="shop-grid">
            <div class="shop-item">
                <div>
                    <div style="color:#0f0; font-weight:bold;">M249 機槍</div>
                    <div style="font-size:12px; color:#aaa;">極高射速，壓制屍潮</div>
                </div>
                <button onclick="buyItem('m249', 800)" id="btn-m249">$800</button>
            </div>
            <div class="shop-item">
                <div>
                    <div style="color:#f00; font-weight:bold;">RPG 火箭筒</div>
                    <div style="font-size:12px; color:#aaa;">單發毀滅性傷害</div>
                </div>
                <button onclick="buyItem('rpg', 1500)" id="btn-rpg">$1500</button>
            </div>
            <div class="shop-item">
                <div>
                    <div style="color:#00ccff; font-weight:bold;">重型護甲 (+50)</div>
                    <div style="font-size:12px; color:#aaa;">減少受到的傷害</div>
                </div>
                <button onclick="buyItem('armor', 200)">$200</button>
            </div>
            <div class="shop-item">
                <div>
                    <div style="color:#fff; font-weight:bold;">醫療包 (+50 HP)</div>
                    <div style="font-size:12px; color:#aaa;">恢復生命值</div>
                </div>
                <button onclick="buyItem('health', 150)">$150</button>
            </div>
        </div>
        <button class="close-shop" onclick="toggleShop()">關閉商店 (ESC)</button>
    </div>

    <div id="menu">
        <h1>NIGHT SURVIVAL</h1>
        <div class="controls">
            <p><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 移動 (已修復方向)</p>
            <p><span class="key">B</span> 開啟/關閉 商店</p>
            <p><span class="key">滑鼠左鍵</span> 射擊</p>
            <p><span class="key">1</span><span class="key">2</span><span class="key">3</span> 切換武器</p>
        </div>
        <p style="margin-top: 30px; font-size: 20px; color: #aaa;">點擊畫面開始遊戲</p>
    </div>

<script>
    // --- 遊戲參數 ---
    const CONFIG = {
        walkSpeed: 10.0,
        jumpForce: 15.0,
        gravity: 30.0,
        mouseSensitivity: 0.002,
        friction: 8.0
    };

    const STATE = {
        hp: 100,
        maxHp: 100,
        armor: 0,
        money: 0,
        wave: 0,
        isPlaying: false,
        isShopOpen: false,
        canJump: false,
        currentWeaponIdx: 0,
        lastShotTime: 0,
        enemiesRemaining: 0,
        bossActive: false
    };

    // 武器數據
    const WEAPONS = [
        { name: "Rifle", damage: 15, fireRate: 150, unlocked: true, color: 0xcccccc },
        { name: "M249", damage: 12, fireRate: 60, unlocked: false, color: 0x00ff00 },
        { name: "RPG", damage: 300, fireRate: 1200, unlocked: false, color: 0xff0000 }
    ];

    // --- Three.js 初始化 ---
    const scene = new THREE.Scene();
    
    // [修正] 調整背景顏色與迷霧，讓畫面不要太黑
    scene.background = new THREE.Color(0x101018); // 深藍黑色，不是純黑
    scene.fog = new THREE.FogExp2(0x101018, 0.015); // 降低迷霧濃度 (0.03 -> 0.015)

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- 燈光系統 ---
    // [修正] 提高環境光亮度
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); // 0.1 -> 0.4
    scene.add(ambientLight);

    // [修正] 提高月光亮度
    const moonLight = new THREE.DirectionalLight(0x6666ff, 0.8); // 0.3 -> 0.8
    moonLight.position.set(50, 100, 50);
    moonLight.castShadow = true;
    scene.add(moonLight);

    // 玩家手電筒 (SpotLight)
    const flashLight = new THREE.SpotLight(0xffffee, 1.2, 60, Math.PI/6, 0.5, 1);
    flashLight.position.set(0, 0, 0);
    flashLight.target.position.set(0, 0, -1);
    camera.add(flashLight);
    camera.add(flashLight.target);

    // --- 玩家與移動 ---
    const playerBody = new THREE.Group();
    scene.add(playerBody);
    playerBody.add(camera);
    camera.position.set(0, 1.7, 0);

    // 武器模型容器
    const weaponContainer = new THREE.Group();
    camera.add(weaponContainer);
    weaponContainer.position.set(0.3, -0.4, -0.6);

    // 簡單武器模型
    const weaponMeshes = [];
    // Rifle
    const m1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 1), new THREE.MeshStandardMaterial({color:0x888}));
    weaponMeshes.push(m1); weaponContainer.add(m1);
    // M249 (更粗)
    const m2 = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 1.2), new THREE.MeshStandardMaterial({color:0x0f0}));
    m2.visible = false; weaponMeshes.push(m2); weaponContainer.add(m2);
    // RPG (很大)
    const m3 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.5, 8), new THREE.MeshStandardMaterial({color:0xa00}));
    m3.rotation.x = Math.PI/2; m3.visible = false; weaponMeshes.push(m3); weaponContainer.add(m3);

    // --- 地圖 ---
    const matFloor = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 }); // 地板稍微亮一點
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), matFloor);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // 隨機障礙物
    const obstacles = [];
    const matBox = new THREE.MeshStandardMaterial({ color: 0x444444 }); // 障礙物稍微亮一點
    for(let i=0; i<30; i++) {
        const h = Math.random() * 3 + 1;
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(2, h, 2), matBox);
        mesh.position.set((Math.random()-0.5)*100, h/2, (Math.random()-0.5)*100);
        // 留出中間出生點
        if (mesh.position.length() < 10) continue;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        obstacles.push(mesh);
    }

    // --- 敵人系統 ---
    const enemies = [];
    const enemyGeo = new THREE.BoxGeometry(0.8, 1.8, 0.8);
    const bossGeo = new THREE.BoxGeometry(3, 6, 3);
    const zombieMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x003300 });
    const bossMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x550000 });

    function spawnEnemy(isBoss = false) {
        const mat = isBoss ? bossMat : zombieMat;
        const geo = isBoss ? bossGeo : enemyGeo;
        const enemy = new THREE.Mesh(geo, mat);
        
        // 隨機位置 (遠離玩家)
        const angle = Math.random() * Math.PI * 2;
        const dist = 30 + Math.random() * 20;
        enemy.position.set(Math.sin(angle)*dist, isBoss? 3 : 0.9, Math.cos(angle)*dist);
        
        // 屬性
        enemy.userData = {
            hp: isBoss ? 2000 : 50, 
            maxHp: isBoss ? 2000 : 50,
            speed: isBoss ? 3.5 : (2.0 + Math.random() * 2),
            damage: isBoss ? 30 : 10,
            isBoss: isBoss,
            score: isBoss ? 1000 : 50
        };

        scene.add(enemy);
        enemies.push(enemy);
        STATE.enemiesRemaining++;
    }

    function startWave(waveNum) {
        STATE.wave = waveNum;
        document.getElementById('wave-val').innerText = waveNum;
        
        // 顯示波數文字
        const announce = document.getElementById('wave-announce');
        announce.innerText = waveNum === 3 ? "BOSS WAVE" : `WAVE ${waveNum}`;
        announce.style.opacity = 1;
        setTimeout(() => announce.style.opacity = 0, 3000);

        if (waveNum === 1) {
            for(let i=0; i<5; i++) spawnEnemy();
        } else if (waveNum === 2) {
            for(let i=0; i<12; i++) spawnEnemy();
        } else if (waveNum === 3) {
            spawnEnemy(true); // Boss
            for(let i=0; i<5; i++) spawnEnemy(); // 小怪伴隨
            STATE.bossActive = true;
            document.getElementById('boss-bar-container').style.display = 'block';
        }
    }

    // --- 控制與輸入 ---
    const input = { w: false, a: false, s: false, d: false };
    const velocity = new THREE.Vector3();
    const menu = document.getElementById('menu');
    const shopMenu = document.getElementById('shop-menu');

    // 鎖定/解鎖邏輯
    document.addEventListener('click', () => {
        if (!STATE.isPlaying && !STATE.isShopOpen) {
            document.body.requestPointerLock();
        } else if (STATE.isPlaying && !STATE.isShopOpen) {
            shoot();
        }
    });

    document.addEventListener('pointerlockchange', () => {
        if (document.pointerLockElement === document.body) {
            STATE.isPlaying = true;
            STATE.isShopOpen = false;
            menu.style.display = 'none';
            shopMenu.style.display = 'none';
        } else {
            if (!STATE.isShopOpen) {
                STATE.isPlaying = false;
                menu.style.display = 'flex';
            }
        }
    });

    // 商店開關
    function toggleShop() {
        if (STATE.isShopOpen) {
            STATE.isShopOpen = false;
            shopMenu.style.display = 'none';
            document.body.requestPointerLock();
        } else {
            STATE.isShopOpen = true;
            STATE.isPlaying = false;
            document.exitPointerLock();
            shopMenu.style.display = 'flex';
            updateShopUI();
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.code === 'KeyB') toggleShop();
        if (!STATE.isPlaying) return;

        switch(e.code) {
            case 'KeyW': input.w = true; break;
            case 'KeyS': input.s = true; break;
            case 'KeyA': input.a = true; break;
            case 'KeyD': input.d = true; break;
            case 'Space': if(STATE.canJump) { velocity.y = CONFIG.jumpForce; STATE.canJump = false; } break;
            case 'Digit1': switchWeapon(0); break;
            case 'Digit2': switchWeapon(1); break;
            case 'Digit3': switchWeapon(2); break;
        }
    });

    document.addEventListener('keyup', (e) => {
        switch(e.code) {
            case 'KeyW': input.w = false; break;
            case 'KeyS': input.s = false; break;
            case 'KeyA': input.a = false; break;
            case 'KeyD': input.d = false; break;
        }
    });

    document.addEventListener('mousemove', (e) => {
        if (!STATE.isPlaying) return;
        playerBody.rotation.y -= e.movementX * CONFIG.mouseSensitivity;
        camera.rotation.x -= e.movementY * CONFIG.mouseSensitivity;
        camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
    });

    // --- 遊戲邏輯 ---

    function switchWeapon(idx) {
        if (!WEAPONS[idx].unlocked) return;
        STATE.currentWeaponIdx = idx;
        weaponMeshes.forEach((m, i) => m.visible = (i === idx));
        document.querySelectorAll('.slot').forEach((el, i) => el.classList.toggle('active', i === idx));
    }

    function shoot() {
        const now = Date.now();
        const weapon = WEAPONS[STATE.currentWeaponIdx];
        if (now - STATE.lastShotTime < weapon.fireRate) return;
        STATE.lastShotTime = now;

        const flash = new THREE.PointLight(weapon.color, 1, 5);
        flash.position.set(0.5, -0.2, -1);
        camera.add(flash);
        setTimeout(() => camera.remove(flash), 50);

        weaponMeshes[STATE.currentWeaponIdx].position.z += 0.2;

        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        
        const intersects = raycaster.intersectObjects(enemies);
        if (intersects.length > 0) {
            const hit = intersects[0];
            const enemy = hit.object;
            
            enemy.userData.hp -= weapon.damage;

            const pushDir = hit.point.clone().sub(playerBody.position).normalize();
            enemy.position.add(pushDir.multiplyScalar(0.5));

            if (enemy.userData.hp <= 0) {
                killEnemy(enemy);
            } else if (enemy.userData.isBoss) {
                const pct = (enemy.userData.hp / enemy.userData.maxHp) * 100;
                document.getElementById('boss-hp-bar').style.width = pct + '%';
            }
        }
    }

    function killEnemy(enemy) {
        scene.remove(enemy);
        enemies.splice(enemies.indexOf(enemy), 1);
        STATE.enemiesRemaining--;
        
        addMoney(enemy.userData.score);

        if (enemy.userData.isBoss) {
            STATE.bossActive = false;
            document.getElementById('boss-bar-container').style.display = 'none';
            alert("VICTORY! BOSS DEFEATED!");
        }

        if (STATE.enemiesRemaining <= 0 && !STATE.bossActive) {
            if (STATE.wave < 3) {
                setTimeout(() => startWave(STATE.wave + 1), 2000);
            } else {
                document.getElementById('wave-announce').innerText = "YOU SURVIVED";
                document.getElementById('wave-announce').style.opacity = 1;
            }
        }
    }

    function addMoney(amount) {
        STATE.money += amount;
        document.getElementById('money-val').innerText = '$' + STATE.money;
        updateShopUI();
    }

    // --- 商店邏輯 ---
    function updateShopUI() {
        document.getElementById('btn-m249').disabled = STATE.money < 800 || WEAPONS[1].unlocked;
        document.getElementById('btn-rpg').disabled = STATE.money < 1500 || WEAPONS[2].unlocked;
        
        if (WEAPONS[1].unlocked) document.getElementById('btn-m249').innerText = "已擁有";
        if (WEAPONS[2].unlocked) document.getElementById('btn-rpg').innerText = "已擁有";
    }

    window.buyItem = function(item, cost) {
        if (STATE.money < cost) return;

        if (item === 'health') {
            if (STATE.hp >= 100) return;
            STATE.hp = Math.min(100, STATE.hp + 50);
            updateHUD();
        } else if (item === 'armor') {
            STATE.armor = Math.min(100, STATE.armor + 50);
            updateHUD();
        } else if (item === 'm249') {
            if (WEAPONS[1].unlocked) return;
            WEAPONS[1].unlocked = true;
            document.getElementById('slot-1').classList.remove('locked');
        } else if (item === 'rpg') {
            if (WEAPONS[2].unlocked) return;
            WEAPONS[2].unlocked = true;
            document.getElementById('slot-2').classList.remove('locked');
        }

        STATE.money -= cost;
        document.getElementById('money-val').innerText = '$' + STATE.money;
        updateShopUI();
    };

    function updateHUD() {
        document.getElementById('hp-val').innerText = Math.floor(STATE.hp);
        document.getElementById('armor-val').innerText = Math.floor(STATE.armor);
    }

    // --- 主循環 ---
    const clock = new THREE.Clock();

    function updatePhysics(delta) {
        // [修正] 移動邏輯反轉
        // W = 前進 (Local Z負方向), S = 後退 (Local Z正方向)
        const forward = Number(input.w) - Number(input.s); // 之前是 s - w，現在改為 w - s
        const side = Number(input.d) - Number(input.a);

        if (input.w || input.s) velocity.z -= forward * CONFIG.walkSpeed * delta * 5.0;
        if (input.a || input.d) velocity.x += side * CONFIG.walkSpeed * delta * 5.0;

        velocity.x -= velocity.x * CONFIG.friction * delta;
        velocity.z -= velocity.z * CONFIG.friction * delta;

        playerBody.translateX(velocity.x * delta);
        playerBody.translateZ(velocity.z * delta);

        velocity.y -= CONFIG.gravity * delta;
        playerBody.position.y += velocity.y * delta;

        if (playerBody.position.y < 0) {
            playerBody.position.y = 0;
            velocity.y = 0;
            STATE.canJump = true;
        }

        weaponMeshes.forEach(m => {
            if (m.position.z > (m === weaponMeshes[2] ? 0 : 0)) {
                 m.position.z -= delta * 2;
                 if(m.position.z < 0) m.position.z = 0;
            }
        });
    }

    function updateEnemies(delta) {
        enemies.forEach(enemy => {
            enemy.lookAt(playerBody.position.x, enemy.position.y, playerBody.position.z);
            enemy.translateZ(enemy.userData.speed * delta);

            const dist = enemy.position.distanceTo(playerBody.position);
            if (dist < 2.0) {
                takeDamage(enemy.userData.damage * delta);
            }
        });
    }

    function takeDamage(amount) {
        let actualDmg = amount;
        if (STATE.armor > 0) {
            const armorAbsorb = amount * 0.5;
            STATE.armor -= armorAbsorb;
            actualDmg = amount * 0.5;
            if (STATE.armor < 0) {
                actualDmg += Math.abs(STATE.armor);
                STATE.armor = 0;
            }
        }
        
        STATE.hp -= actualDmg;
        updateHUD();

        document.body.style.boxShadow = "inset 0 0 50px rgba(255,0,0,0.5)";
        setTimeout(() => document.body.style.boxShadow = "none", 100);

        if (STATE.hp <= 0) {
            STATE.hp = 0;
            STATE.isPlaying = false;
            document.exitPointerLock();
            alert("GAME OVER - YOU DIED");
            location.reload();
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        
        if (STATE.isPlaying) {
            const delta = Math.min(clock.getDelta(), 0.1);
            updatePhysics(delta);
            updateEnemies(delta);
        } else {
            clock.getDelta();
        }
        
        renderer.render(scene, camera);
    }

    startWave(1);
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>

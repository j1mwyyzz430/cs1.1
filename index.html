<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Survival: Holy Awakening</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Courier New', Courier, monospace; user-select: none; }
        
        /* UI 層 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* 受傷紅屏 */
        #damage-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(180, 0, 0, 0.9);
            opacity: 0; transition: opacity 0.1s; mix-blend-mode: multiply;
        }

        /* 準星 */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 24px; height: 24px;
            transform: translate(-50%, -50%); transition: 0.1s;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255, 50, 50, 0.9); box-shadow: 0 0 5px #f00; }
        #crosshair::before { top: 11px; left: 0; width: 24px; height: 2px; }
        #crosshair::after { top: 0; left: 11px; width: 2px; height: 24px; }

        /* Boss 血條 */
        #boss-bar-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 70%; height: 30px; background: rgba(0,0,0,0.8); border: 2px solid #500;
            display: none; box-shadow: 0 0 20px #f00;
        }
        #boss-hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #880000, #ff0000); transition: width 0.2s; }
        #boss-label { position: absolute; top: -25px; left: 0; color: #f00; font-weight: bold; text-shadow: 1px 1px 0 #000; letter-spacing: 2px; font-size: 20px; width: 100%; text-align: center; }

        /* 底部 HUD */
        #hud-bottom { position: absolute; bottom: 30px; left: 30px; display: flex; gap: 30px; color: #ccc; text-shadow: 2px 2px 0 #000; }
        .hud-box { display: flex; flex-direction: column; }
        .hud-label { font-size: 14px; color: #888; font-weight: bold; text-transform: uppercase; }
        .hud-value { font-size: 36px; font-weight: 900; letter-spacing: 2px; font-family: sans-serif; }
        .c-red { color: #d00; } .c-gold { color: #d4af37; }

        /* 武器欄 */
        #weapon-slots { position: absolute; bottom: 30px; right: 30px; display: flex; gap: 10px; }
        .slot { width: 70px; height: 70px; background: rgba(20, 0, 0, 0.6); border: 2px solid #444; color: #555; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; transition: 0.2s; position: relative; }
        .slot.active { border-color: #d00; color: #fff; background: rgba(100, 0, 0, 0.3); transform: scale(1.1); box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        .slot span { font-size: 10px; position: absolute; top: 2px; left: 4px; }
        .w-name { font-size: 12px; text-align: center; }

        /* 文字提示 */
        #wave-announce {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; color: #800; font-weight: 900; text-shadow: 0 0 20px #000;
            opacity: 0; transition: opacity 2s; text-align: center; width: 100%;
            font-family: 'Times New Roman', serif; letter-spacing: 5px;
        }
        
        #story-text {
            position: absolute; bottom: 20%; left: 0; width: 100%; text-align: center;
            font-size: 24px; color: #fff; text-shadow: 0 0 10px #00f;
            display: none; font-style: italic; font-family: serif;
        }

        /* 菜單 */
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; z-index: 100; }
        h1 { color: #d00; font-size: 70px; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 10px; text-shadow: 0 0 20px #500; font-family: serif; }
        .controls { text-align: left; background: rgba(50,0,0,0.2); padding: 20px; border: 1px solid #300; margin-bottom: 20px; }
        .key { display: inline-block; background: #222; padding: 2px 6px; border: 1px solid #555; border-radius: 4px; color: #fff; font-size: 12px; }
        button { padding: 15px 40px; font-size: 24px; background: #300; color: #fff; border: 2px solid #600; cursor: pointer; transition: 0.2s; font-family: serif; letter-spacing: 2px; }
        button:hover { background: #500; box-shadow: 0 0 20px #f00; }

    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="damage-vignette"></div>
        <div id="crosshair"></div>
        <div id="boss-bar-container">
            <div id="boss-label">COSMIC HORROR</div>
            <div id="boss-hp-bar"></div>
        </div>
        <div id="wave-announce">WAVE 1</div>
        <div id="story-text"></div>
        <div id="hud-bottom">
            <div class="hud-box">
                <span class="hud-label">Health</span>
                <span class="hud-value c-red" id="hp-val">100</span>
            </div>
            <div class="hud-box">
                <span class="hud-label">Ammo</span>
                <span class="hud-value c-gold" id="ammo-val">12</span>
            </div>
        </div>
        <div id="weapon-slots">
            <div class="slot active" id="slot-1"><span>1</span><div class="w-name">Pistol</div></div>
            <div class="slot" id="slot-2"><span>2</span><div class="w-name">Shotgun</div></div>
            <div class="slot" id="slot-3"><span>3</span><div class="w-name">SMG</div></div>
        </div>
    </div>

    <div id="menu">
        <h1>Night Survival</h1>
        <div class="controls">
            <p><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Move</p>
            <p><span class="key">L-Click</span> Shoot</p>
            <p><span class="key">R</span> Reload</p>
            <p><span class="key">1</span><span class="key">2</span><span class="key">3</span> Change Weapon</p>
        </div>
        <button onclick="startGame()">ENTER DARKNESS</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
/** 
 * 音效系統：氛圍控制器
 */
const AudioSys = {
    ctx: null,
    bgmNodes: [],
    currentPhase: 'none', // 'spooky', 'despair', 'holy'
    nextLaughTime: 0,

    init() {
        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
    },

    stopBGM() {
        this.bgmNodes.forEach(n => {
            try { n.stop(); n.disconnect(); } catch(e){}
        });
        this.bgmNodes = [];
    },

    // 階段一：陰森 + 笑聲
    playSpooky() {
        if (this.currentPhase === 'spooky') return;
        this.stopBGM();
        this.currentPhase = 'spooky';

        // 低頻背景噪音 (Brown Noise 模擬)
        const bufferSize = this.ctx.sampleRate * 2;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            const white = Math.random() * 2 - 1;
            data[i] = (lastOut + (0.02 * white)) / 1.02;
            lastOut = data[i];
            data[i] *= 3.5; 
        }
        let lastOut = 0;

        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        noise.loop = true;
        const gain = this.ctx.createGain();
        gain.gain.value = 0.15;
        
        noise.connect(gain);
        gain.connect(this.ctx.destination);
        noise.start();
        this.bgmNodes.push(noise);
        this.nextLaughTime = this.ctx.currentTime + 5 + Math.random() * 10;
    },

    updateSpooky() {
        if (this.currentPhase === 'spooky' && this.ctx.currentTime > this.nextLaughTime) {
            this.playLaugh();
            this.nextLaughTime = this.ctx.currentTime + 8 + Math.random() * 15; // 隨機間隔
        }
    },

    playLaugh() {
        // 詭異笑聲合成：頻率調製
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(400, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.5); // 音調下降

        // 顫音 (LFO)
        const lfo = this.ctx.createOscillator();
        lfo.type = 'sawtooth';
        lfo.frequency.value = 15; // 快速顫動
        const lfoGain = this.ctx.createGain();
        lfoGain.gain.value = 100;

        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);

        osc.connect(gain);
        gain.connect(this.ctx.destination);

        gain.gain.setValueAtTime(0, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + 0.1);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.6);

        osc.start();
        lfo.start();
        osc.stop(this.ctx.currentTime + 0.7);
        lfo.stop(this.ctx.currentTime + 0.7);
    },

    // 階段二：絕望 (宇宙 Boss)
    playDespair() {
        if (this.currentPhase === 'despair') return;
        this.stopBGM();
        this.currentPhase = 'despair';

        // 拍頻效果 (Beating)
        const freq = 50;
        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        osc1.type = 'sawtooth';
        osc2.type = 'sawtooth';
        osc1.frequency.value = freq;
        osc2.frequency.value = freq + 2; // 2Hz 差異產生嗡嗡聲

        const gain = this.ctx.createGain();
        gain.gain.value = 0.1;

        // 濾波器掃描
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 200;

        osc1.connect(filter);
        osc2.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);

        osc1.start();
        osc2.start();
        this.bgmNodes.push(osc1, osc2);

        // 讓濾波器緩慢移動
        setInterval(() => {
            if(this.currentPhase !== 'despair') return;
            filter.frequency.rampToValueAtTime(100 + Math.random()*300, this.ctx.currentTime + 2);
        }, 2000);
    },

    // 階段三：神聖 (覺醒)
    playHoly() {
        if (this.currentPhase === 'holy') return;
        this.stopBGM();
        this.currentPhase = 'holy';

        // 大三和弦 (C Major: C3, E3, G3)
        const freqs = [130.81, 164.81, 196.00, 261.63]; 
        
        freqs.forEach((f, i) => {
            const osc = this.ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = f;
            
            const gain = this.ctx.createGain();
            // 讓聲音像呼吸一樣起伏
            gain.gain.value = 0;
            gain.gain.setTargetAtTime(0.08, this.ctx.currentTime, 2); // 慢速 Attack

            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            this.bgmNodes.push(osc);
        });
    },

    playShoot(type) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        const now = this.ctx.currentTime;
        if (type === 'shotgun') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'moon') {
            // 月牙神聖攻擊音效
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.linearRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        }
    }
};

// --- 遊戲邏輯 ---

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let w, h;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// 遊戲狀態
let gameActive = false;
let lastTime = 0;
let keys = {};
let mouse = { x: 0, y: 0 };
let camera = { x: 0, y: 0 };
let wave = 1;
let score = 0;
let bossActive = false;
let moonAwakened = false;

// 實體
const player = { x: 0, y: 0, hp: 100, maxHp: 100, speed: 4, weapon: 0, ammo: [12, 6, 30], maxAmmo: [12, 6, 30], reloading: false, muzzleFlashTimer: 0 };
let bullets = [];
let enemies = [];
let particles = [];
let torches = []; // 火炬數組

// 武器定義
const weapons = [
    { name: 'Pistol', damage: 25, delay: 400, reload: 1000, spread: 0.05, auto: false, color: '#ffcc00' },
    { name: 'Shotgun', damage: 15, delay: 900, reload: 1800, spread: 0.3, count: 6, auto: false, color: '#ff5500' },
    { name: 'SMG', damage: 12, delay: 100, reload: 1500, spread: 0.15, auto: true, color: '#ffffaa' },
    { name: 'Moon', damage: 80, delay: 300, reload: 0, spread: 0, auto: true, color: '#00ffff' } // 覺醒武器
];
let lastShot = 0;

// 地圖
const mapSize = 2000;
const tileSize = 100;

function initGame() {
    player.x = mapSize / 2;
    player.y = mapSize / 2;
    player.hp = 100;
    player.weapon = 0;
    bullets = [];
    enemies = [];
    particles = [];
    torches = [];
    wave = 1;
    bossActive = false;
    moonAwakened = false;
    
    // 生成火炬
    for(let i=0; i<20; i++) {
        torches.push({
            x: Math.random() * mapSize,
            y: Math.random() * mapSize,
            flickerOffset: Math.random() * 100
        });
    }

    startWave();
    AudioSys.playSpooky();
}

function startWave() {
    const title = document.getElementById('wave-announce');
    title.innerText = bossActive ? "BOSS WAVE" : `WAVE ${wave}`;
    title.style.opacity = 1;
    setTimeout(() => title.style.opacity = 0, 3000);

    let count = 5 + wave * 2;
    if (wave === 5) { // Boss Wave
        bossActive = true;
        count = 1; 
        AudioSys.playDespair(); // 切換到絕望音樂
        document.getElementById('boss-bar-container').style.display = 'block';
    }

    for (let i = 0; i < count; i++) {
        spawnEnemy(bossActive);
    }
}

function spawnEnemy(isBoss) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 600 + Math.random() * 200;
    enemies.push({
        x: player.x + Math.cos(angle) * dist,
        y: player.y + Math.sin(angle) * dist,
        hp: isBoss ? 2000 : 40 + wave * 10,
        maxHp: isBoss ? 2000 : 40 + wave * 10,
        speed: isBoss ? 2.5 : 2 + Math.random(),
        size: isBoss ? 60 : 20,
        type: isBoss ? 'boss' : 'zombie',
        color: isBoss ? '#500' : '#353'
    });
}

function startGame() {
    document.getElementById('menu').style.display = 'none';
    AudioSys.init();
    initGame();
    gameActive = true;
    requestAnimationFrame(loop);
}

// 輸入處理
window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === 'r') reload();
    if (['1','2','3'].includes(e.key) && !moonAwakened) switchWeapon(parseInt(e.key)-1);
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', () => {
    if (gameActive && !player.reloading) tryShoot();
});

function switchWeapon(idx) {
    if (player.reloading) return;
    player.weapon = idx;
    document.querySelectorAll('.slot').forEach((s, i) => s.classList.toggle('active', i === idx));
}

function reload() {
    if (player.reloading || player.ammo[player.weapon] === player.maxAmmo[player.weapon]) return;
    if (moonAwakened) return; // 月牙不需要換彈
    player.reloading = true;
    const el = document.querySelectorAll('.slot')[player.weapon];
    el.style.opacity = 0.5;
    
    setTimeout(() => {
        player.ammo[player.weapon] = player.maxAmmo[player.weapon];
        player.reloading = false;
        el.style.opacity = 1;
        updateHud();
    }, weapons[player.weapon].reload);
}

function tryShoot() {
    const now = Date.now();
    const w = moonAwakened ? weapons[3] : weapons[player.weapon];
    
    if (now - lastShot < w.delay) return;
    if (!moonAwakened && player.ammo[player.weapon] <= 0) { reload(); return; }

    lastShot = now;
    if (!moonAwakened) player.ammo[player.weapon]--;
    
    // 槍口閃光計時器
    player.muzzleFlashTimer = 3; // 閃爍 3 幀

    const baseAngle = Math.atan2(mouse.y - h/2, mouse.x - w/2);
    const count = w.count || 1;

    // 播放音效
    AudioSys.playShoot(moonAwakened ? 'moon' : w.name.toLowerCase());

    for (let i = 0; i < count; i++) {
        const angle = baseAngle + (Math.random() - 0.5) * w.spread;
        bullets.push({
            x: player.x, y: player.y,
            vx: Math.cos(angle) * 20, vy: Math.sin(angle) * 20,
            life: 60, damage: w.damage,
            color: w.color,
            isMoon: moonAwakened
        });
    }
    
    // 屏幕震動
    camera.x += (Math.random()-0.5) * 10;
    camera.y += (Math.random()-0.5) * 10;
    
    updateHud();
}

function updateHud() {
    document.getElementById('hp-val').innerText = Math.ceil(player.hp);
    document.getElementById('ammo-val').innerText = moonAwakened ? '∞' : player.ammo[player.weapon];
}

function triggerAwakening() {
    moonAwakened = true;
    player.hp = 100;
    AudioSys.playHoly(); // 切換到神聖音樂
    
    const story = document.getElementById('story-text');
    story.innerText = "The Crescent Moon answers your despair...";
    story.style.display = 'block';
    setTimeout(() => story.style.display = 'none', 5000);

    // 替換 UI
    document.getElementById('weapon-slots').innerHTML = 
        `<div class="slot active" style="border-color:#0ff; box-shadow:0 0 20px #0ff;">
            <div class="w-name" style="color:#0ff">MOON</div>
         </div>`;
}

function loop() {
    if (!gameActive) return;
    
    const now = Date.now();
    const dt = (now - lastTime) / 16;
    lastTime = now;

    // 更新音效邏輯
    AudioSys.updateSpooky();

    // 玩家移動
    let mx = 0, my = 0;
    if (keys['w']) my -= 1;
    if (keys['s']) my += 1;
    if (keys['a']) mx -= 1;
    if (keys['d']) mx += 1;
    
    if (mx !== 0 || my !== 0) {
        const len = Math.sqrt(mx*mx + my*my);
        player.x += (mx/len) * player.speed * dt;
        player.y += (my/len) * player.speed * dt;
    }

    // 限制地圖
    player.x = Math.max(0, Math.min(mapSize, player.x));
    player.y = Math.max(0, Math.min(mapSize, player.y));

    // 攝像機跟隨
    camera.x += (player.x - w/2 - camera.x) * 0.1;
    camera.y += (player.y - h/2 - camera.y) * 0.1;

    // 自動射擊
    if (keys['mousedown'] || (mouse.down && (moonAwakened || weapons[player.weapon].auto))) {
        // Note: Simple check, actual mouse state tracking needed for full auto
    }

    // 更新子彈
    bullets.forEach((b, i) => {
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.life -= dt;
        
        // 粒子尾跡
        if (Math.random() > 0.5) {
            particles.push({
                x: b.x, y: b.y, vx: 0, vy: 0, life: 10, 
                color: b.isMoon ? 'rgba(0,255,255,0.5)' : 'rgba(255,200,50,0.5)', size: 2
            });
        }

        if (b.life <= 0) bullets.splice(i, 1);
    });

    // 更新敵人
    enemies.forEach((e, i) => {
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        e.x += (dx/dist) * e.speed * dt;
        e.y += (dy/dist) * e.speed * dt;

        // 碰撞檢測 (子彈)
        bullets.forEach((b, bi) => {
            const bDist = Math.sqrt((b.x - e.x)**2 + (b.y - e.y)**2);
            if (bDist < e.size + 5) {
                e.hp -= b.damage;
                bullets.splice(bi, 1);
                // 受擊粒子
                for(let p=0; p<3; p++) particles.push({
                    x: e.x, y: e.y, 
                    vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, 
                    life: 20, color: '#900', size: 3
                });
            }
        });

        // 碰撞檢測 (玩家)
        if (dist < e.size + 10) {
            player.hp -= isBoss(e) ? 0.5 : 0.2;
            document.getElementById('damage-vignette').style.opacity = 0.8;
            setTimeout(() => document.getElementById('damage-vignette').style.opacity = 0, 100);
            updateHud();
            if (player.hp <= 0) gameOver();
        }

        if (e.hp <= 0) {
            enemies.splice(i, 1);
            if (isBoss(e)) {
                triggerAwakening();
                bossActive = false;
                document.getElementById('boss-bar-container').style.display = 'none';
            }
        }
    });

    if (enemies.length === 0) {
        wave++;
        startWave();
    }

    // Boss UI 更新
    if (bossActive && enemies.length > 0) {
        const boss = enemies.find(e => e.type === 'boss');
        if (boss) {
            const pct = (boss.hp / boss.maxHp) * 100;
            document.getElementById('boss-hp-bar').style.width = `${pct}%`;
        }
    }

    // 粒子更新
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    });

    // 槍口閃光計時器遞減
    if (player.muzzleFlashTimer > 0) player.muzzleFlashTimer--;

    draw();
    requestAnimationFrame(loop);
}

function isBoss(e) { return e.type === 'boss'; }

function draw() {
    // 1. 繪製地面和背景
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, w, h);
    
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // 網格地板
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x <= mapSize; x += tileSize) { ctx.moveTo(x, 0); ctx.lineTo(x, mapSize); }
    for (let y = 0; y <= mapSize; y += tileSize) { ctx.moveTo(0, y); ctx.lineTo(mapSize, y); }
    ctx.stroke();

    // 繪製火炬 (物理實體)
    torches.forEach(t => {
        ctx.fillStyle = '#530';
        ctx.fillRect(t.x - 5, t.y - 5, 10, 10);
    });

    // 繪製屍體/血跡 (簡化)
    
    // 繪製敵人
    enemies.forEach(e => {
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size, 0, Math.PI*2);
        ctx.fill();
        // 眼睛
        ctx.fillStyle = '#f00';
        ctx.beginPath();
        ctx.arc(e.x + Math.cos(Date.now()/200)*5, e.y + Math.sin(Date.now()/200)*5, e.size/3, 0, Math.PI*2);
        ctx.fill();
    });

    // 繪製玩家
    ctx.fillStyle = moonAwakened ? '#0ff' : '#ccc';
    ctx.beginPath();
    ctx.arc(player.x, player.y, 15, 0, Math.PI*2);
    ctx.fill();

    // 繪製子彈
    bullets.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.isMoon ? 6 : 3, 0, Math.PI*2);
        ctx.fill();
    });

    // 繪製粒子
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
    });

    ctx.restore();

    // --- 光照渲染層 (Lighting Pass) ---
    // 我們不使用全黑，而是使用半透明黑，讓玩家能勉強看見
    // 然後使用 'destination-out' 擦除光照區域

    // 1. 繪製黑暗遮罩
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.75)'; // 基礎環境光：不要全黑 (0.9 -> 0.75)
    ctx.fillRect(0, 0, w, h);

    // 2. 切換混合模式：擦除黑暗
    ctx.globalCompositeOperation = 'destination-out';

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // 光源 A: 玩家自帶光環 (手電筒/光環)
    let pGrad = ctx.createRadialGradient(player.x, player.y, 10, player.x, player.y, 250);
    pGrad.addColorStop(0, 'rgba(0,0,0,1)'); // 中心完全透明 (最強光)
    pGrad.addColorStop(1, 'rgba(0,0,0,0)'); // 邊緣保留黑暗
    ctx.fillStyle = pGrad;
    ctx.beginPath();
    ctx.arc(player.x, player.y, 250, 0, Math.PI*2);
    ctx.fill();

    // 光源 B: 槍口閃光 (開火時瞬間變亮)
    if (player.muzzleFlashTimer > 0) {
        let fGrad = ctx.createRadialGradient(player.x, player.y, 10, player.x, player.y, 500);
        fGrad.addColorStop(0, 'rgba(0,0,0,1)');
        fGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = fGrad;
        ctx.beginPath();
        ctx.arc(player.x, player.y, 500, 0, Math.PI*2);
        ctx.fill();
    }

    // 光源 C: 火炬 (帶有閃爍)
    const time = Date.now();
    torches.forEach(t => {
        // 簡單的閃爍算法
        const flicker = Math.sin(time / 100 + t.flickerOffset) * 10 + 150; 
        let tGrad = ctx.createRadialGradient(t.x, t.y, 5, t.x, t.y, flicker);
        tGrad.addColorStop(0, 'rgba(0,0,0,0.8)');
        tGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = tGrad;
        ctx.beginPath();
        ctx.arc(t.x, t.y, flicker, 0, Math.PI*2);
        ctx.fill();
    });

    // 光源 D: 月牙子彈發光
    if (moonAwakened) {
        bullets.forEach(b => {
            let bGrad = ctx.createRadialGradient(b.x, b.y, 2, b.x, b.y, 60);
            bGrad.addColorStop(0, 'rgba(0,0,0,0.8)');
            bGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = bGrad;
            ctx.beginPath();
            ctx.arc(b.x, b.y, 60, 0, Math.PI*2);
            ctx.fill();
        });
    }

    ctx.restore();

    // 3. 恢復正常混合模式以繪製 UI
    ctx.globalCompositeOperation = 'source-over';
}

function gameOver() {
    gameActive = false;
    AudioSys.stopBGM();
    alert("YOU DIED IN DARKNESS\nScore: " + wave);
    location.reload();
}

// 監聽鼠標按下持續射擊
setInterval(() => {
    if (gameActive && mouse.down) tryShoot();
}, 50);
window.addEventListener('mousedown', () => mouse.down = true);
window.addEventListener('mouseup', () => mouse.down = false);

</script>

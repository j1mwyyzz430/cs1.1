<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS: Desert Zombie Survival</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; user-select: none; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            background: transparent; border: 2px solid #0f0; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }
        #crosshair::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: #0f0; transform: translate(-50%, -50%); border-radius: 50%;
        }
        #hud {
            position: absolute; bottom: 20px; left: 20px; color: #fff;
            font-size: 20px; text-shadow: 1px 1px 2px #000; z-index: 10;
            display: flex; gap: 20px;
        }
        .hud-item { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; border: 1px solid #555; }
        .hud-label { font-size: 12px; color: #aaa; display: block; }
        .hud-value { font-size: 24px; font-weight: bold; color: #ffcc00; }
        
        #shop {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95); border: 2px solid #ffcc00;
            padding: 20px; color: #fff; display: none; z-index: 20;
            width: 500px; text-align: center; border-radius: 10px;
        }
        #shop h2 { margin-top: 0; color: #ffcc00; }
        .shop-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid #444; margin-bottom: 5px;
        }
        .shop-item:hover { background: rgba(255, 255, 255, 0.1); }
        .shop-btn {
            background: #ffcc00; color: #000; border: none; padding: 5px 15px;
            cursor: pointer; font-weight: bold;
        }
        .shop-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        
        #message-area {
            position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 30px; text-align: center; text-shadow: 2px 2px 4px #f00;
            pointer-events: none; z-index: 10;
        }
        
        #boss-bar-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 60%; height: 30px; background: #333; border: 2px solid #fff;
            display: none; z-index: 10;
        }
        #boss-bar-fill {
            width: 100%; height: 100%; background: #f00; transition: width 0.2s;
        }
        #boss-label {
            position: absolute; top: 0; left: 0; width: 100%; text-align: center;
            line-height: 30px; color: #fff; font-weight: bold; text-shadow: 1px 1px 2px #000;
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #fff; z-index: 30;
        }
        .key { border: 1px solid #fff; padding: 2px 6px; border-radius: 4px; background: #333; }
    </style>
    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="crosshair"></div>
    
    <div id="hud">
        <div class="hud-item">
            <span class="hud-label">HP</span>
            <span class="hud-value" id="hp-val">100</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">MONEY</span>
            <span class="hud-value" id="money-val">$0</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">WEAPON</span>
            <span class="hud-value" id="weapon-val">AK-47</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">AMMO</span>
            <span class="hud-value" id="ammo-val">30 / 90</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">LEVEL</span>
            <span class="hud-value" id="level-val">1</span>
        </div>
    </div>

    <div id="boss-bar-container">
        <div id="boss-bar-fill"></div>
        <div id="boss-label">BOSS: MUTANT ABOMINATION</div>
    </div>

    <div id="message-area"></div>

    <div id="shop">
        <h2>BUY MENU (按 B 關閉)</h2>
        <div class="shop-item">
            <span>AK-47 子彈 (30發)</span>
            <button class="shop-btn" onclick="buyAmmo('ak', 200)">$200</button>
        </div>
        <div class="shop-item">
            <span>M249 機槍 (含子彈)</span>
            <button class="shop-btn" onclick="buyWeapon('m249', 3000)">$3000</button>
        </div>
        <div class="shop-item">
            <span>M249 子彈 (100發)</span>
            <button class="shop-btn" onclick="buyAmmo('m249', 500)">$500</button>
        </div>
        <div class="shop-item">
            <span>RPG 火箭筒 (含5發)</span>
            <button class="shop-btn" onclick="buyWeapon('rpg', 5000)">$5000</button>
        </div>
        <div class="shop-item">
            <span>RPG 火箭彈 (1發)</span>
            <button class="shop-btn" onclick="buyAmmo('rpg', 1000)">$1000</button>
        </div>
        <div class="shop-item">
            <span>醫療包 (+50 HP)</span>
            <button class="shop-btn" onclick="buyHealth(500)">$500</button>
        </div>
    </div>

    <div id="start-screen">
        <h1>CS: ZOMBIE DUST</h1>
        <p>點擊畫面開始遊戲</p>
        <p>移動: <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span></p>
        <p>射擊: <span class="key">左鍵</span> (長按連射)</p>
        <p>商店: <span class="key">B</span></p>
        <p>切換武器: <span class="key">1</span> <span class="key">2</span> <span class="key">3</span></p>
    </div>

<script>
    // --- 遊戲狀態 ---
    const GameState = {
        hp: 100,
        money: 800,
        level: 1,
        isPlaying: false,
        isShopOpen: false,
        lastShotTime: 0,
        zombiesKilled: 0,
        zombiesToSpawn: 10,
        bossActive: false
    };

    // --- 武器數據 ---
    const Weapons = {
        ak: { name: "AK-47", damage: 25, fireRate: 100, ammo: 30, reserve: 90, spread: 0.02, type: 'ray' },
        m249: { name: "M249", damage: 20, fireRate: 60, ammo: 100, reserve: 200, spread: 0.05, type: 'ray' },
        rpg: { name: "RPG-7", damage: 500, fireRate: 1500, ammo: 1, reserve: 5, spread: 0.01, type: 'projectile' }
    };
    
    let currentWeaponKey = 'ak';
    let ownedWeapons = ['ak'];

    // --- Three.js 初始化 ---
    const scene = new THREE.Scene();
    // 霧氣增加恐怖感
    scene.fog = new THREE.FogExp2(0x110d0a, 0.02);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- 聲音合成 (Procedural Audio) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        if (type === 'shoot') {
            if(currentWeaponKey === 'rpg') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 0.5);
                gain.gain.setValueAtTime(0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            }
        } else if (type === 'hit') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'empty') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.05);
            osc.start(now);
            osc.stop(now + 0.05);
        } else if (type === 'explosion') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(50, now);
            osc.frequency.exponentialRampToValueAtTime(1, now + 1);
            gain.gain.setValueAtTime(1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1);
            osc.start(now);
            osc.stop(now + 1);
        }
    }

    // --- 紋理生成 (Canvas) ---
    function createTexture(color, noise = true) {
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = color;
        ctx.fillRect(0, 0, 64, 64);
        if (noise) {
            for (let i = 0; i < 200; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.2})`;
                ctx.fillRect(Math.random() * 64, Math.random() * 64, 2, 2);
            }
        }
        const tex = new THREE.CanvasTexture(canvas);
        tex.magFilter = THREE.NearestFilter;
        return tex;
    }

    const sandTex = createTexture('#C2B280'); // 沙漠色
    const wallTex = createTexture('#E1C699'); // 牆壁色
    const boxTex = createTexture('#8B4513');  // 箱子色
    const zombieTex = createTexture('#2E8B57'); // 僵尸綠
    const bossTex = createTexture('#8B0000'); // Boss 紅

    // --- 地圖構建 ---
    const mapObjects = [];
    const floorGeometry = new THREE.PlaneGeometry(200, 200);
    const floorMaterial = new THREE.MeshLambertMaterial({ map: sandTex });
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    function createBox(x, y, z, w, h, d, material, isWall = false) {
        const geo = new THREE.BoxGeometry(w, h, d);
        const mesh = new THREE.Mesh(geo, material);
        mesh.position.set(x, y + h / 2, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        mapObjects.push(mesh);
        return mesh;
    }

    // 構建 Dust 2 風格的簡單佈局
    // 外牆
    createBox(0, 0, -50, 100, 10, 2, new THREE.MeshLambertMaterial({ map: wallTex }), true);
    createBox(0, 0, 50, 100, 10, 2, new THREE.MeshLambertMaterial({ map: wallTex }), true);
    createBox(-50, 0, 0, 2, 10, 100, new THREE.MeshLambertMaterial({ map: wallTex }), true);
    createBox(50, 0, 0, 2, 10, 100, new THREE.MeshLambertMaterial({ map: wallTex }), true);

    // 障礙物 (箱子, 牆壁)
    createBox(-20, 0, -20, 10, 4, 10, new THREE.MeshLambertMaterial({ map: boxTex })); // B Site boxes
    createBox(20, 0, 20, 8, 4, 8, new THREE.MeshLambertMaterial({ map: boxTex })); // A Site boxes
    createBox(0, 0, 0, 20, 6, 5, new THREE.MeshLambertMaterial({ map: wallTex }), true); // Mid doors wall
    createBox(-30, 0, 10, 5, 5, 20, new THREE.MeshLambertMaterial({ map: wallTex }), true); // Tunnels
    createBox(30, 0, -10, 5, 3, 15, new THREE.MeshLambertMaterial({ map: boxTex })); // Catwalk

    // --- 燈光 ---
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5); // 柔和環境光
    scene.add(ambientLight);

    // 玩家手電筒
    const flashLight = new THREE.SpotLight(0xffffff, 1);
    flashLight.angle = Math.PI / 6;
    flashLight.penumbra = 0.2;
    flashLight.distance = 40;
    flashLight.castShadow = true;
    camera.add(flashLight);
    flashLight.target.position.set(0, 0, -1);
    camera.add(flashLight.target);
    scene.add(camera);

    // --- 玩家控制 ---
    const controls = {
        moveForward: false, moveBackward: false, moveLeft: false, moveRight: false,
        velocity: new THREE.Vector3(), direction: new THREE.Vector3()
    };
    
    // Pointer Lock
    const blocker = document.getElementById('start-screen');
    document.addEventListener('click', function () {
        if (!GameState.isPlaying && !GameState.isShopOpen) {
            document.body.requestPointerLock();
        }
    });

    document.addEventListener('pointerlockchange', function () {
        if (document.pointerLockElement === document.body) {
            GameState.isPlaying = true;
            if(!GameState.isShopOpen) blocker.style.display = 'none';
        } else {
            if (!GameState.isShopOpen) {
                GameState.isPlaying = false;
                blocker.style.display = 'flex';
            }
        }
    });

    document.addEventListener('mousemove', function (event) {
        if (GameState.isPlaying && !GameState.isShopOpen) {
            camera.rotation.y -= event.movementX * 0.002;
            camera.rotation.x -= event.movementY * 0.002;
            camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
        }
    });

    document.addEventListener('keydown', (event) => {
        switch (event.code) {
            case 'KeyW': controls.moveForward = true; break;
            case 'KeyA': controls.moveLeft = true; break;
            case 'KeyS': controls.moveBackward = true; break;
            case 'KeyD': controls.moveRight = true; break;
            case 'KeyB': toggleShop(); break;
            case 'Digit1': switchWeapon('ak'); break;
            case 'Digit2': switchWeapon('m249'); break;
            case 'Digit3': switchWeapon('rpg'); break;
        }
    });

    document.addEventListener('keyup', (event) => {
        switch (event.code) {
            case 'KeyW': controls.moveForward = false; break;
            case 'KeyA': controls.moveLeft = false; break;
            case 'KeyS': controls.moveBackward = false; break;
            case 'KeyD': controls.moveRight = false; break;
        }
    });

    let isMouseDown = false;
    document.addEventListener('mousedown', () => { if(GameState.isPlaying && !GameState.isShopOpen) isMouseDown = true; });
    document.addEventListener('mouseup', () => { isMouseDown = false; });

    // --- 遊戲邏輯 ---

    // 僵尸系統
    const zombies = [];
    class Zombie {
        constructor(isBoss = false) {
            this.isBoss = isBoss;
            this.hp = isBoss ? 2000 : 100;
            this.maxHp = this.hp;
            this.speed = isBoss ? 0.08 : (0.05 + Math.random() * 0.05);
            this.damage = isBoss ? 20 : 5;
            
            const size = isBoss ? 6 : 2;
            const geo = new THREE.BoxGeometry(size, size, size);
            const mat = new THREE.MeshLambertMaterial({ map: isBoss ? bossTex : zombieTex });
            this.mesh = new THREE.Mesh(geo, mat);
            
            // 隨機生成位置 (遠離玩家)
            let x, z;
            do {
                x = (Math.random() - 0.5) * 90;
                z = (Math.random() - 0.5) * 90;
            } while (Math.abs(x - camera.position.x) < 20 && Math.abs(z - camera.position.z) < 20);

            this.mesh.position.set(x, size/2, z);
            scene.add(this.mesh);
            zombies.push(this);
        }

        update() {
            // 簡單尋路：直線朝向玩家
            const dx = camera.position.x - this.mesh.position.x;
            const dz = camera.position.z - this.mesh.position.z;
            const dist = Math.sqrt(dx*dx + dz*dz);

            if (dist > 1.5) {
                this.mesh.position.x += (dx / dist) * this.speed;
                this.mesh.position.z += (dz / dist) * this.speed;
                this.mesh.lookAt(camera.position.x, this.mesh.position.y, camera.position.z);
            } else {
                // 攻擊玩家
                if (Math.random() < 0.05) {
                    takeDamage(this.damage);
                }
            }
        }

        hit(dmg) {
            this.hp -= dmg;
            playSound('hit');
            
            // 擊退效果
            const dx = this.mesh.position.x - camera.position.x;
            const dz = this.mesh.position.z - camera.position.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            this.mesh.position.x += (dx/dist) * 0.5;
            this.mesh.position.z += (dz/dist) * 0.5;

            if (this.isBoss) updateBossBar(this.hp, this.maxHp);

            if (this.hp <= 0) {
                this.die();
            }
        }

        die() {
            createBlood(this.mesh.position);
            scene.remove(this.mesh);
            zombies.splice(zombies.indexOf(this), 1);
            GameState.money += this.isBoss ? 5000 : 100;
            GameState.zombiesKilled++;
            updateHUD();
            
            if (this.isBoss) {
                showMessage("BOSS DEFEATED! LEVEL COMPLETE!");
                GameState.bossActive = false;
                document.getElementById('boss-bar-container').style.display = 'none';
                setTimeout(nextLevel, 3000);
            } else if (!GameState.bossActive && GameState.zombiesKilled >= GameState.zombiesToSpawn) {
                if (GameState.level === 3) { // 假設第3關是 Boss 關
                    spawnBoss();
                } else {
                    showMessage("WAVE CLEARED!");
                    setTimeout(nextLevel, 2000);
                }
            }
        }
    }

    // 血跡系統
    const bloods = [];
    function createBlood(pos) {
        const geo = new THREE.PlaneGeometry(3, 3);
        const mat = new THREE.MeshBasicMaterial({ color: 0x880000, transparent: true, opacity: 0.8 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.x = -Math.PI / 2;
        mesh.position.set(pos.x, 0.05, pos.z);
        mesh.rotation.z = Math.random() * Math.PI;
        scene.add(mesh);
        bloods.push(mesh);
        // 限制血跡數量以優化性能
        if (bloods.length > 50) {
            const old = bloods.shift();
            scene.remove(old);
        }
    }

    // 投射物 (火箭彈)
    const projectiles = [];
    class Rocket {
        constructor(position, direction) {
            this.mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0x333333 })
            );
            this.mesh.position.copy(position);
            this.velocity = direction.multiplyScalar(1.5);
            scene.add(this.mesh);
            projectiles.push(this);
        }
        update() {
            this.mesh.position.add(this.velocity);
            
            // 碰撞檢測 (簡單版：撞地面或僵尸)
            if (this.mesh.position.y < 0) this.explode();
            
            for (let z of zombies) {
                if (this.mesh.position.distanceTo(z.mesh.position) < 2) {
                    this.explode();
                    return;
                }
            }
            // 撞牆檢測
            if (Math.abs(this.mesh.position.x) > 50 || Math.abs(this.mesh.position.z) > 50) this.explode();
        }
        explode() {
            playSound('explosion');
            // 範圍傷害
            for (let i = zombies.length - 1; i >= 0; i--) {
                const z = zombies[i];
                const dist = this.mesh.position.distanceTo(z.mesh.position);
                if (dist < 10) {
                    z.hit(Weapons.rpg.damage * (1 - dist/10));
                }
            }
            // 爆炸視覺效果 (簡單閃光)
            const flash = new THREE.PointLight(0xffaa00, 5, 20);
            flash.position.copy(this.mesh.position);
            scene.add(flash);
            setTimeout(() => scene.remove(flash), 100);

            scene.remove(this.mesh);
            projectiles.splice(projectiles.indexOf(this), 1);
        }
    }

    // 射擊邏輯
    function shoot() {
        const now = Date.now();
        const weapon = Weapons[currentWeaponKey];
        
        if (now - GameState.lastShotTime < (60000 / weapon.fireRate)) return;
        
        if (weapon.ammo <= 0) {
            playSound('empty');
            GameState.lastShotTime = now;
            return;
        }

        weapon.ammo--;
        updateHUD();
        playSound('shoot');
        GameState.lastShotTime = now;

        // 計算射擊方向 (帶擴散)
        const dir = new THREE.Vector3(0, 0, -1);
        dir.applyQuaternion(camera.quaternion);
        dir.x += (Math.random() - 0.5) * weapon.spread;
        dir.y += (Math.random() - 0.5) * weapon.spread;
        dir.z += (Math.random() - 0.5) * weapon.spread;
        dir.normalize();

        if (weapon.type === 'projectile') {
            new Rocket(camera.position, dir);
        } else {
            // 射線檢測
            const raycaster = new THREE.Raycaster(camera.position, dir);
            // 檢測僵尸
            const zombieMeshes = zombies.map(z => z.mesh);
            const intersects = raycaster.intersectObjects(zombieMeshes);

            if (intersects.length > 0) {
                const hitObj = intersects[0].object;
                const zombie = zombies.find(z => z.mesh === hitObj);
                if (zombie) zombie.hit(weapon.damage);
            }
        }
        
        // 後坐力 (簡單視角上移)
        camera.rotation.x += 0.005;
    }

    // 玩家受傷
    function takeDamage(amount) {
        GameState.hp -= amount;
        updateHUD();
        // 受傷紅屏閃爍
        document.body.style.boxShadow = "inset 0 0 50px red";
        setTimeout(() => document.body.style.boxShadow = "none", 100);

        if (GameState.hp <= 0) {
            gameOver();
        }
    }

    // 關卡控制
    function nextLevel() {
        GameState.level++;
        GameState.zombiesKilled = 0;
        GameState.zombiesToSpawn += 5;
        showMessage(`LEVEL ${GameState.level}`);
        updateHUD();
        
        // 生成僵尸
        if (GameState.level === 3) {
            // Boss 關卡前奏
            showMessage("WARNING: HUGE SIGNAL DETECTED");
            GameState.zombiesToSpawn = 5; // 先打幾隻小怪
        }
    }

    function spawnBoss() {
        GameState.bossActive = true;
        new Zombie(true); // 生成 Boss
        document.getElementById('boss-bar-container').style.display = 'block';
        showMessage("BOSS FIGHT!");
    }

    function spawnZombiesLogic() {
        if (GameState.bossActive) return;
        // 維持場上有一定數量的僵尸，直到殺夠數
        const currentActive = zombies.length;
        const remainingToSpawn = GameState.zombiesToSpawn - GameState.zombiesKilled - currentActive;
        
        if (currentActive < 5 && remainingToSpawn > 0) {
            if (Math.random() < 0.05) new Zombie();
        }
    }

    // 商店與 UI
    function toggleShop() {
        GameState.isShopOpen = !GameState.isShopOpen;
        const shopEl = document.getElementById('shop');
        if (GameState.isShopOpen) {
            shopEl.style.display = 'block';
            document.exitPointerLock();
        } else {
            shopEl.style.display = 'none';
            document.body.requestPointerLock();
        }
    }

    window.buyAmmo = function(wKey, cost) {
        if (GameState.money >= cost) {
            GameState.money -= cost;
            if (wKey === 'rpg') Weapons[wKey].reserve += 2; // RPG 買得少
            else Weapons[wKey].reserve += (wKey === 'm249' ? 100 : 30);
            updateHUD();
        }
    };

    window.buyWeapon = function(wKey, cost) {
        if (GameState.money >= cost && !ownedWeapons.includes(wKey)) {
            GameState.money -= cost;
            ownedWeapons.push(wKey);
            switchWeapon(wKey);
            updateHUD();
        }
    };

    window.buyHealth = function(cost) {
        if (GameState.money >= cost && GameState.hp < 100) {
            GameState.money -= cost;
            GameState.hp = Math.min(100, GameState.hp + 50);
            updateHUD();
        }
    }

    function switchWeapon(key) {
        if (ownedWeapons.includes(key)) {
            currentWeaponKey = key;
            updateHUD();
        }
    }

    function updateHUD() {
        document.getElementById('hp-val').innerText = Math.floor(GameState.hp);
        document.getElementById('money-val').innerText = '$' + GameState.money;
        const w = Weapons[currentWeaponKey];
        document.getElementById('weapon-val').innerText = w.name;
        document.getElementById('ammo-val').innerText = `${w.ammo} / ${w.reserve}`;
        document.getElementById('level-val').innerText = GameState.level;
    }

    function updateBossBar(hp, max) {
        const pct = Math.max(0, (hp / max) * 100);
        document.getElementById('boss-bar-fill').style.width = pct + '%';
    }

    function showMessage(msg) {
        const el = document.getElementById('message-area');
        el.innerText = msg;
        el.style.opacity = 1;
        setTimeout(() => el.style.opacity = 0, 3000);
    }

    function gameOver() {
        GameState.isPlaying = false;
        document.exitPointerLock();
        alert(`GAME OVER! You reached Level ${GameState.level}`);
        location.reload();
    }

    // --- 主循環 ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);

        if (!GameState.isPlaying) return;

        const delta = clock.getDelta();

        // 移動邏輯
        controls.velocity.x -= controls.velocity.x * 10.0 * delta;
        controls.velocity.z -= controls.velocity.z * 10.0 * delta;

        controls.direction.z = Number(controls.moveForward) - Number(controls.moveBackward);
        controls.direction.x = Number(controls.moveRight) - Number(controls.moveLeft);
        controls.direction.normalize();

        if (controls.moveForward || controls.moveBackward) controls.velocity.z -= controls.direction.z * 400.0 * delta;
        if (controls.moveLeft || controls.moveRight) controls.velocity.x -= controls.direction.x * 400.0 * delta;

        // 側向移動計算
        const speed = 0.1; 
        // 簡單的 FPS 移動實現
        if (controls.moveForward) camera.translateZ(-speed);
        if (controls.moveBackward) camera.translateZ(speed);
        if (controls.moveLeft) camera.translateX(-speed);
        if (controls.moveRight) camera.translateX(speed);

        // 限制在地面上 (簡單高度)
        camera.position.y = 1.6;

        // 邊界檢查 (非常簡單的)
        if (camera.position.x > 48) camera.position.x = 48;
        if (camera.position.x < -48) camera.position.x = -48;
        if (camera.position.z > 48) camera.position.z = 48;
        if (camera.position.z < -48) camera.position.z = -48;

        // 射擊
        if (isMouseDown) shoot();

        // 僵尸更新
        spawnZombiesLogic();
        zombies.forEach(z => z.update());

        // 投射物更新
        projectiles.forEach(p => p.update());

        renderer.render(scene, camera);
    }

    // 啟動
    animate();
    updateHUD();

</script>
</body>
</html>

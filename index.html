<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Survival: Arsenal Update</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Courier New', Courier, monospace; user-select: none; }
        canvas { cursor: none; display: block; } /* 隱藏系統鼠標 */
        
        /* UI 層 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* 準星 */
        #crosshair {
            position: absolute; top: 0; left: 0; width: 24px; height: 24px;
            transform: translate(-50%, -50%); pointer-events: none; will-change: top, left;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(0, 255, 0, 0.9); box-shadow: 0 0 5px #0f0; }
        #crosshair::before { top: 11px; left: 0; width: 24px; height: 2px; }
        #crosshair::after { top: 0; left: 11px; width: 2px; height: 24px; }

        /* 商店提示 */
        #shop-prompt {
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
            font-size: 24px; color: #ffeb3b; font-weight: bold; text-shadow: 0 0 10px #000;
            display: none; text-align: center; background: rgba(0,0,0,0.6); padding: 10px; border: 2px solid #ffeb3b;
        }

        /* 底部 HUD */
        #hud-bottom { position: absolute; bottom: 30px; left: 30px; display: flex; gap: 40px; color: #ccc; text-shadow: 2px 2px 0 #000; }
        .hud-box { display: flex; flex-direction: column; }
        .hud-label { font-size: 14px; color: #888; font-weight: bold; text-transform: uppercase; }
        .hud-value { font-size: 36px; font-weight: 900; letter-spacing: 2px; font-family: sans-serif; }
        .c-red { color: #d00; } .c-green { color: #0f0; }

        /* 武器欄 */
        #weapon-slots { position: absolute; bottom: 30px; right: 30px; display: flex; gap: 10px; }
        .slot { width: 80px; height: 80px; background: rgba(20, 0, 0, 0.6); border: 2px solid #444; color: #555; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; transition: 0.2s; position: relative; }
        .slot.active { border-color: #d00; color: #fff; background: rgba(100, 0, 0, 0.3); transform: scale(1.1); box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        .slot span { font-size: 14px; position: absolute; top: 5px; left: 5px; }
        .w-name { font-size: 14px; text-align: center; margin-top: 10px; }

        /* 菜單 */
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; z-index: 100; pointer-events: auto; cursor: default; }
        h1 { color: #d00; font-size: 60px; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 20px #500; }
        button { padding: 20px 50px; font-size: 24px; background: #300; color: #fff; border: 2px solid #600; cursor: pointer; font-family: serif; letter-spacing: 2px; }
        button:hover { background: #500; box-shadow: 0 0 20px #f00; }

        /* Boss 血條 */
        #boss-bar-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 60%; height: 20px; background: rgba(0,0,0,0.8); border: 1px solid #500; display: none;
        }
        #boss-hp-bar { width: 100%; height: 100%; background: #d00; }

    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="boss-bar-container"><div id="boss-hp-bar"></div></div>
        <div id="shop-prompt">PRESS [E] TO BUY M249 ($1000)</div>
        
        <div id="hud-bottom">
            <div class="hud-box">
                <span class="hud-label">Health</span>
                <span class="hud-value c-red" id="hp-val">100</span>
            </div>
            <div class="hud-box">
                <span class="hud-label">Money</span>
                <span class="hud-value c-green" id="money-val">$0</span>
            </div>
        </div>

        <div id="weapon-slots">
            <div class="slot active" id="slot-1"><span>1</span><div class="w-name" id="gun-name">AK47</div></div>
            <div class="slot" id="slot-2"><span>2</span><div class="w-name">AXE</div></div>
        </div>
    </div>

    <div id="menu">
        <h1>Night Survival</h1>
        <p style="color:#888; margin-bottom: 30px;">WASD: Move | CLICK: Shoot | 1/2: Switch Weapon | E: Buy</p>
        <button onclick="startGame()">ENTER DARKNESS</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
// --- 音效系統 (Audio System) ---
const AudioSys = {
    ctx: null,
    bgmNodes: [],
    currentPhase: 'none', 
    nextLaughTime: 0,

    init() {
        // 確保在用戶點擊時初始化並恢復 Context
        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
        if (this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
    },

    stopBGM() {
        this.bgmNodes.forEach(n => {
            try { n.stop(); n.disconnect(); } catch(e){}
        });
        this.bgmNodes = [];
    },

    // 階段一：陰森 (Spooky)
    playSpooky() {
        if (this.currentPhase === 'spooky') return;
        this.stopBGM();
        this.currentPhase = 'spooky';

        // 創建恐怖氛圍音 (低頻噪音)
        const bufferSize = this.ctx.sampleRate * 2;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        let lastOut = 0;
        for (let i = 0; i < bufferSize; i++) {
            const white = Math.random() * 2 - 1;
            data[i] = (lastOut + (0.02 * white)) / 1.02;
            lastOut = data[i];
            data[i] *= 3.5; 
        }

        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        noise.loop = true;
        const gain = this.ctx.createGain();
        gain.gain.value = 0.2; // 音量
        
        noise.connect(gain);
        gain.connect(this.ctx.destination);
        noise.start();
        this.bgmNodes.push(noise);
        this.nextLaughTime = this.ctx.currentTime + 3;
    },

    updateSpooky() {
        if (this.currentPhase === 'spooky' && this.ctx.currentTime > this.nextLaughTime) {
            this.playLaugh();
            this.nextLaughTime = this.ctx.currentTime + 5 + Math.random() * 10;
        }
    },

    playLaugh() {
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(600, t);
        osc.frequency.exponentialRampToValueAtTime(150, t + 0.6);
        
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.2, t + 0.1);
        gain.gain.linearRampToValueAtTime(0, t + 0.6);

        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(t + 0.7);
    },

    // 階段二：絕望 (Boss)
    playDespair() {
        if (this.currentPhase === 'despair') return;
        this.stopBGM();
        this.currentPhase = 'despair';

        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        osc1.type = 'sawtooth';
        osc2.type = 'sawtooth';
        osc1.frequency.value = 60;
        osc2.frequency.value = 63; // 不和諧音程

        const gain = this.ctx.createGain();
        gain.gain.value = 0.15;

        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(this.ctx.destination);
        osc1.start();
        osc2.start();
        this.bgmNodes.push(osc1, osc2);
    },

    // 階段三：神聖 (覺醒)
    playHoly() {
        if (this.currentPhase === 'holy') return;
        this.stopBGM();
        this.currentPhase = 'holy';

        const freqs = [261.63, 329.63, 392.00, 523.25]; // C Major Chord
        freqs.forEach(f => {
            const osc = this.ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = f;
            const gain = this.ctx.createGain();
            gain.gain.value = 0.05;
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            this.bgmNodes.push(osc);
        });
    },

    playSfx(type) {
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        if (type === 'ak') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, t);
            osc.frequency.exponentialRampToValueAtTime(50, t + 0.1);
            gain.gain.setValueAtTime(0.1, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
            osc.start(t); osc.stop(t + 0.1);
        } else if (type === 'm249') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400, t);
            osc.frequency.exponentialRampToValueAtTime(100, t + 0.08);
            gain.gain.setValueAtTime(0.1, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
            osc.start(t); osc.stop(t + 0.08);
        } else if (type === 'rpg_fire') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(100, t);
            osc.frequency.linearRampToValueAtTime(300, t + 0.3);
            gain.gain.setValueAtTime(0.2, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.3);
            osc.start(t); osc.stop(t + 0.3);
        } else if (type === 'explosion') {
            // 簡單模擬爆炸噪音
            const bufferSize = this.ctx.sampleRate * 0.5;
            const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);
            const noise = this.ctx.createBufferSource();
            noise.buffer = buffer;
            const nGain = this.ctx.createGain();
            nGain.gain.setValueAtTime(0.5, t);
            nGain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
            noise.connect(nGain);
            nGain.connect(this.ctx.destination);
            noise.start(t);
        } else if (type === 'axe') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(200, t);
            osc.frequency.linearRampToValueAtTime(50, t + 0.2);
            gain.gain.setValueAtTime(0.2, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.2);
            osc.start(t); osc.stop(t + 0.2);
        }
    }
};

// --- 遊戲邏輯 ---

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let w, h;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// 遊戲狀態
let gameActive = false;
let lastTime = 0;
let keys = {};
let mouse = { x: 0, y: 0, down: false };
let camera = { x: 0, y: 0 };
let wave = 1;
let bossActive = false;
let moonAwakened = false;

// 玩家數據
const player = { 
    x: 0, y: 0, 
    hp: 100, maxHp: 100, 
    speed: 5, 
    money: 0,
    weaponSlot: 1, // 1=Gun, 2=Axe
    gunTier: 0, // 0=AK, 1=M249, 2=RPG
    muzzleFlashTimer: 0,
    axeAngle: 0,
    axeActive: false
};

// 武器定義
const guns = [
    { name: 'AK47', damage: 35, delay: 100, spread: 0.05, speed: 25, color: '#ffaa00', type: 'bullet' },
    { name: 'M249', damage: 30, delay: 60, spread: 0.15, speed: 25, color: '#ffffaa', type: 'bullet' },
    { name: 'RPG', damage: 300, delay: 800, spread: 0.02, speed: 15, color: '#ff5500', type: 'rocket' }
];

let bullets = [];
let enemies = [];
let particles = [];
let torches = [];
let lastShot = 0;

const mapSize = 2000;

function initGame() {
    player.x = mapSize / 2;
    player.y = mapSize / 2;
    player.hp = 100;
    player.money = 0;
    player.weaponSlot = 1;
    player.gunTier = 0;
    
    bullets = [];
    enemies = [];
    particles = [];
    torches = [];
    wave = 1;
    bossActive = false;
    moonAwakened = false;
    
    // 生成火炬
    for(let i=0; i<25; i++) {
        torches.push({
            x: Math.random() * mapSize,
            y: Math.random() * mapSize,
            flickerOffset: Math.random() * 100
        });
    }

    updateHud();
    startWave();
    AudioSys.playSpooky();
}

function startWave() {
    let count = 10 + wave * 5;
    if (wave === 5) { // Boss Wave
        bossActive = true;
        count = 1; 
        AudioSys.playDespair();
        document.getElementById('boss-bar-container').style.display = 'block';
    }

    for (let i = 0; i < count; i++) {
        spawnEnemy(bossActive);
    }
}

function spawnEnemy(isBoss) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 700 + Math.random() * 300;
    enemies.push({
        x: player.x + Math.cos(angle) * dist,
        y: player.y + Math.sin(angle) * dist,
        hp: isBoss ? 3000 : 100,
        maxHp: isBoss ? 3000 : 100,
        speed: isBoss ? 3 : 2 + Math.random(),
        size: isBoss ? 60 : 20,
        type: isBoss ? 'boss' : 'zombie',
        color: isBoss ? '#800' : '#353'
    });
}

function startGame() {
    document.getElementById('menu').style.display = 'none';
    AudioSys.init(); // 關鍵：啟動音效
    initGame();
    gameActive = true;
    requestAnimationFrame(loop);
}

// 輸入處理
window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === '1') switchWeapon(1);
    if (e.key === '2') switchWeapon(2);
    if (e.key.toLowerCase() === 'e') buyUpgrade();
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => { 
    // 更新虛擬準星位置
    mouse.x = e.clientX; 
    mouse.y = e.clientY; 
    const ch = document.getElementById('crosshair');
    ch.style.left = mouse.x + 'px';
    ch.style.top = mouse.y + 'px';
});
window.addEventListener('mousedown', () => mouse.down = true);
window.addEventListener('mouseup', () => mouse.down = false);

function switchWeapon(slot) {
    player.weaponSlot = slot;
    document.getElementById('slot-1').className = slot === 1 ? 'slot active' : 'slot';
    document.getElementById('slot-2').className = slot === 2 ? 'slot active' : 'slot';
}

function buyUpgrade() {
    if (player.weaponSlot !== 1) return;
    
    // 購買 M249
    if (player.gunTier === 0 && player.money >= 1000) {
        player.money -= 1000;
        player.gunTier = 1;
        document.getElementById('gun-name').innerText = "M249";
        updateHud();
    }
    // 購買 RPG
    else if (player.gunTier === 1 && player.money >= 2000) {
        player.money -= 2000;
        player.gunTier = 2;
        document.getElementById('gun-name').innerText = "RPG";
        updateHud();
    }
}

function updateHud() {
    document.getElementById('hp-val').innerText = Math.ceil(player.hp);
    document.getElementById('money-val').innerText = '$' + player.money;

    // 商店提示邏輯
    const prompt = document.getElementById('shop-prompt');
    if (player.weaponSlot === 1) {
        if (player.gunTier === 0 && player.money >= 1000) {
            prompt.innerText = "PRESS [E] TO BUY M249 ($1000)";
            prompt.style.display = 'block';
        } else if (player.gunTier === 1 && player.money >= 2000) {
            prompt.innerText = "PRESS [E] TO BUY RPG ($2000)";
            prompt.style.display = 'block';
        } else {
            prompt.style.display = 'none';
        }
    } else {
        prompt.style.display = 'none';
    }
}

function tryShoot() {
    const now = Date.now();
    
    // 斧頭邏輯
    if (player.weaponSlot === 2) {
        if (now - lastShot < 500) return; // 斧頭攻速
        lastShot = now;
        AudioSys.playSfx('axe');
        player.axeActive = true;
        player.axeAngle = 0;
        
        // 斧頭範圍傷害
        enemies.forEach(e => {
            const dist = Math.hypot(player.x - e.x, player.y - e.y);
            if (dist < 150) { // 攻擊範圍
                // 普通殭屍 999 傷害 (必殺)，Boss 50 傷害
                const dmg = e.type === 'boss' ? 50 : 999;
                damageEnemy(e, dmg);
                // 擊退
                const angle = Math.atan2(e.y - player.y, e.x - player.x);
                e.x += Math.cos(angle) * 50;
                e.y += Math.sin(angle) * 50;
            }
        });
        return;
    }

    // 槍械邏輯
    const gun = moonAwakened ? { ...guns[0], damage: 100, delay: 50, color: '#0ff' } : guns[player.gunTier];
    if (now - lastShot < gun.delay) return;
    
    lastShot = now;
    player.muzzleFlashTimer = 3;
    
    // 播放音效
    if (moonAwakened) AudioSys.playSfx('ak'); // 覺醒音效暫用 AK
    else if (gun.name === 'RPG') AudioSys.playSfx('rpg_fire');
    else if (gun.name === 'M249') AudioSys.playSfx('m249');
    else AudioSys.playSfx('ak');

    // 計算射擊角度 (從屏幕中心計算，因為 Camera 跟隨 Player)
    // 屏幕中心是 w/2, h/2。滑鼠位置是 mouse.x, mouse.y
    const angle = Math.atan2(mouse.y - h/2, mouse.x - w/2);
    
    bullets.push({
        x: player.x, y: player.y,
        vx: Math.cos(angle + (Math.random()-0.5)*gun.spread) * gun.speed,
        vy: Math.sin(angle + (Math.random()-0.5)*gun.spread) * gun.speed,
        life: 100,
        damage: gun.damage,
        color: gun.color,
        type: gun.type,
        isMoon: moonAwakened
    });

    // 屏幕震動
    if (gun.name === 'RPG') { camera.x += (Math.random()-0.5)*20; camera.y += (Math.random()-0.5)*20; }
    else { camera.x += (Math.random()-0.5)*5; camera.y += (Math.random()-0.5)*5; }
}

function createExplosion(x, y) {
    AudioSys.playSfx('explosion');
    // 爆炸粒子
    for(let i=0; i<20; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
            life: 30, color: '#ff5500', size: 5 + Math.random()*10
        });
    }
    // 範圍傷害
    enemies.forEach(e => {
        const dist = Math.hypot(e.x - x, e.y - y);
        if (dist < 200) {
            damageEnemy(e, 300);
        }
    });
}

function damageEnemy(e, amount) {
    e.hp -= amount;
    // 受擊粒子
    for(let p=0; p<3; p++) particles.push({
        x: e.x, y: e.y, 
        vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, 
        life: 20, color: '#900', size: 3
    });
}

function triggerAwakening() {
    moonAwakened = true;
    player.hp = 100;
    AudioSys.playHoly();
    document.getElementById('gun-name').innerText = "MOON";
    document.getElementById('gun-name').style.color = "#0ff";
}

function loop() {
    if (!gameActive) return;
    
    const now = Date.now();
    AudioSys.updateSpooky();

    // 玩家移動
    let mx = 0, my = 0;
    if (keys['w']) my -= 1;
    if (keys['s']) my += 1;
    if (keys['a']) mx -= 1;
    if (keys['d']) mx += 1;
    
    if (mx !== 0 || my !== 0) {
        const len = Math.sqrt(mx*mx + my*my);
        player.x += (mx/len) * player.speed;
        player.y += (my/len) * player.speed;
    }

    // 限制地圖
    player.x = Math.max(0, Math.min(mapSize, player.x));
    player.y = Math.max(0, Math.min(mapSize, player.y));

    // 攝像機跟隨 (平滑)
    camera.x += (player.x - w/2 - camera.x) * 0.1;
    camera.y += (player.y - h/2 - camera.y) * 0.1;

    // 射擊
    if (mouse.down) tryShoot();

    // 斧頭動畫
    if (player.axeActive) {
        player.axeAngle += 0.5;
        if (player.axeAngle > Math.PI * 2) player.axeActive = false;
    }

    // 更新子彈
    bullets.forEach((b, i) => {
        b.x += b.vx;
        b.y += b.vy;
        b.life--;
        
        // 火箭尾跡
        if (b.type === 'rocket') {
            particles.push({
                x: b.x, y: b.y, vx: 0, vy: 0, life: 10, color: '#aaa', size: 4
            });
        }

        if (b.life <= 0) bullets.splice(i, 1);
    });

    // 更新敵人
    enemies.forEach((e, i) => {
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        e.x += (dx/dist) * e.speed;
        e.y += (dy/dist) * e.speed;

        // 子彈碰撞
        bullets.forEach((b, bi) => {
            const bDist = Math.hypot(b.x - e.x, b.y - e.y);
            if (bDist < e.size + 10) {
                if (b.type === 'rocket') {
                    createExplosion(b.x, b.y);
                    bullets.splice(bi, 1);
                } else {
                    damageEnemy(e, b.damage);
                    bullets.splice(bi, 1);
                }
            }
        });

        // 玩家碰撞
        if (dist < e.size + 10) {
            player.hp -= isBoss(e) ? 0.5 : 0.2;
            updateHud();
            if (player.hp <= 0) gameOver();
        }

        if (e.hp <= 0) {
            enemies.splice(i, 1);
            player.money += 100;
            updateHud();
            if (isBoss(e)) {
                triggerAwakening();
                bossActive = false;
                document.getElementById('boss-bar-container').style.display = 'none';
            }
        }
    });

    if (enemies.length === 0) {
        wave++;
        startWave();
    }

    // Boss 血條
    if (bossActive && enemies.length > 0) {
        const boss = enemies.find(e => e.type === 'boss');
        if (boss) {
            const pct = (boss.hp / boss.maxHp) * 100;
            document.getElementById('boss-hp-bar').style.width = `${pct}%`;
        }
    }

    // 粒子
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    });

    if (player.muzzleFlashTimer > 0) player.muzzleFlashTimer--;

    draw();
    requestAnimationFrame(loop);
}

function isBoss(e) { return e.type === 'boss'; }

function draw() {
    // 背景
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, w, h);
    
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // 網格
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x <= mapSize; x += 100) { ctx.moveTo(x, 0); ctx.lineTo(x, mapSize); }
    for (let y = 0; y <= mapSize; y += 100) { ctx.moveTo(0, y); ctx.lineTo(mapSize, y); }
    ctx.stroke();

    // 火炬
    torches.forEach(t => {
        ctx.fillStyle = '#530';
        ctx.fillRect(t.x - 5, t.y - 5, 10, 10);
    });

    // 敵人
    enemies.forEach(e => {
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size, 0, Math.PI*2);
        ctx.fill();
    });

    // 玩家
    ctx.fillStyle = moonAwakened ? '#0ff' : '#ccc';
    ctx.beginPath();
    ctx.arc(player.x, player.y, 15, 0, Math.PI*2);
    ctx.fill();

    // 斧頭特效 (旋風)
    if (player.axeActive) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(player.x, player.y, 60, player.axeAngle, player.axeAngle + Math.PI);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.arc(player.x, player.y, 50, player.axeAngle + 1, player.axeAngle + Math.PI + 1);
        ctx.stroke();
    }

    // 子彈
    bullets.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.type === 'rocket' ? 6 : 3, 0, Math.PI*2);
        ctx.fill();
    });

    // 粒子
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
    });

    ctx.restore();

    // --- 光照系統 ---
    // 1. 繪製半透明黑層
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; 
    ctx.fillRect(0, 0, w, h);

    // 2. 擦除光亮區域
    ctx.globalCompositeOperation = 'destination-out';
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // 玩家光環
    let pGrad = ctx.createRadialGradient(player.x, player.y, 10, player.x, player.y, 250);
    pGrad.addColorStop(0, 'rgba(0,0,0,1)');
    pGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = pGrad;
    ctx.beginPath(); ctx.arc(player.x, player.y, 250, 0, Math.PI*2); ctx.fill();

    // 槍口閃光
    if (player.muzzleFlashTimer > 0) {
        let fGrad = ctx.createRadialGradient(player.x, player.y, 10, player.x, player.y, 500);
        fGrad.addColorStop(0, 'rgba(0,0,0,1)');
        fGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = fGrad;
        ctx.beginPath(); ctx.arc(player.x, player.y, 500, 0, Math.PI*2); ctx.fill();
    }

    // 火炬
    const time = Date.now();
    torches.forEach(t => {
        const flicker = Math.sin(time / 100 + t.flickerOffset) * 10 + 150; 
        let tGrad = ctx.createRadialGradient(t.x, t.y, 5, t.x, t.y, flicker);
        tGrad.addColorStop(0, 'rgba(0,0,0,0.8)');
        tGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = tGrad;
        ctx.beginPath(); ctx.arc(t.x, t.y, flicker, 0, Math.PI*2); ctx.fill();
    });
    
    // 火箭/爆炸發光
    particles.forEach(p => {
        if (p.size > 5) { // 假設大粒子是爆炸
            let eGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 100);
            eGrad.addColorStop(0, 'rgba(0,0,0,1)');
            eGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = eGrad;
            ctx.beginPath(); ctx.arc(p.x, p.y, 100, 0, Math.PI*2); ctx.fill();
        }
    });

    ctx.restore();
    ctx.globalCompositeOperation = 'source-over';
}

function gameOver() {
    gameActive = false;
    AudioSys.stopBGM();
    alert("YOU DIED\nScore: " + wave);
    location.reload();
}

</script>

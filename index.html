<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Survival: Demon Slayer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; user-select: none; }
        
        /* UI 層 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* 準心 */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 24px; height: 24px;
            transform: translate(-50%, -50%); transition: 0.1s;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(0, 255, 0, 0.8); box-shadow: 0 0 4px #0f0; }
        #crosshair::before { top: 11px; left: 0; width: 24px; height: 2px; }
        #crosshair::after { top: 0; left: 11px; width: 2px; height: 24px; }
        .recoil #crosshair { transform: translate(-50%, -50%) scale(1.5); opacity: 0.5; }

        /* BOSS 血條 */
        #boss-bar-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 70%; height: 30px; background: rgba(0,0,0,0.8); border: 2px solid #500;
            display: none;
            box-shadow: 0 0 20px #f00;
        }
        #boss-hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #880000); transition: width 0.2s; }
        #boss-label { position: absolute; top: -25px; left: 0; color: #f00; font-weight: bold; text-shadow: 1px 1px 0 #000; letter-spacing: 2px; font-size: 20px; }

        /* 底部資訊欄 */
        #hud-bottom { position: absolute; bottom: 30px; left: 30px; display: flex; gap: 30px; color: #fff; text-shadow: 2px 2px 0 #000; }
        .hud-box { display: flex; flex-direction: column; }
        .hud-label { font-size: 12px; color: #aaa; font-weight: bold; text-transform: uppercase; }
        .hud-value { font-size: 32px; font-weight: 900; letter-spacing: 1px; }
        .c-green { color: #0f0; } .c-yellow { color: #ffcc00; } .c-blue { color: #00ccff; }

        /* 武器欄 */
        #weapon-slots { position: absolute; bottom: 30px; right: 30px; display: flex; gap: 10px; }
        .slot { width: 70px; height: 70px; background: rgba(0,0,0,0.6); border: 2px solid #333; color: #555; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; transition: 0.2s; position: relative; }
        .slot.active { border-color: #0f0; color: #fff; background: rgba(0, 255, 0, 0.1); transform: scale(1.1); box-shadow: 0 0 15px rgba(0,255,0,0.3); }
        .slot span { font-size: 10px; position: absolute; top: 2px; left: 4px; }
        .w-name { font-size: 12px; text-align: center; }

        /* 波數提示 */
        #wave-announce {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; color: #ff0000; font-weight: 900; text-shadow: 0 0 20px #f00;
            opacity: 0; transition: opacity 1s; pointer-events: none; text-align: center; width: 100%;
        }
        
        /* 二階段特效覆蓋層 */
        #phase2-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; transition: opacity 2s;
            z-index: 50;
        }

        /* 商店介面 */
        #shop-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 600px; background: rgba(10, 10, 15, 0.95); border: 2px solid #ffcc00;
            padding: 20px; display: none; flex-direction: column; color: #fff; pointer-events: auto; z-index: 200;
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.2);
        }
        #shop-menu h2 { margin: 0 0 20px 0; color: #ffcc00; text-align: center; text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .shop-item { background: #222; padding: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; cursor: pointer; transition: 0.2s; }
        .shop-item:hover { background: #333; border-color: #ffcc00; }
        .shop-item button { background: #ffcc00; border: none; padding: 5px 10px; font-weight: bold; cursor: pointer; color: #000; }
        .shop-item button:disabled { background: #555; color: #888; cursor: not-allowed; }
        .close-shop { margin-top: 20px; padding: 10px; background: #c00; color: #fff; border: none; font-weight: bold; cursor: pointer; }

        /* 開始菜單 */
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; z-index: 100; }
        h1 { color: #f00; font-size: 60px; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px #f00; }
        .controls { text-align: left; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .key { display: inline-block; background: #333; padding: 2px 6px; border-radius: 4px; border: 1px solid #666; color: #ffcc00; font-weight: bold; margin: 0 2px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="phase2-flash"></div>
        
        <div id="boss-bar-container">
            <div id="boss-label">⚠️ DEMON LORD ⚠️</div>
            <div id="boss-hp-bar"></div>
        </div>

        <div id="wave-announce">WAVE 1</div>

        <div id="hud-bottom">
            <div class="hud-box"><span class="hud-label">HEALTH</span><span class="hud-value c-green" id="hp-val">100</span></div>
            <div class="hud-box"><span class="hud-label">ARMOR</span><span class="hud-value c-blue" id="armor-val">0</span></div>
            <div class="hud-box"><span class="hud-label">MONEY</span><span class="hud-value c-yellow" id="money-val">$0</span></div>
            <div class="hud-box"><span class="hud-label">WAVE</span><span class="hud-value" id="wave-val">1</span></div>
        </div>

        <div id="weapon-slots">
            <div class="slot active" id="slot-0"><span>1</span><div class="w-name" id="name-0">AK-47</div></div>
            <div class="slot" id="slot-1"><span>2</span><div class="w-name">PISTOL</div></div>
            <div class="slot" id="slot-2"><span>3</span><div class="w-name">AXE</div></div>
        </div>
    </div>

    <!-- 商店 -->
    <div id="shop-menu">
        <h2>Black Market</h2>
        <div class="shop-grid">
            <div class="shop-item">
                <div>
                    <div style="color:#0f0; font-weight:bold;">M249 機槍</div>
                    <div style="font-size:12px; color:#aaa;">射速極快，彈藥傾瀉</div>
                </div>
                <button onclick="buyWeapon('m249', 1000)">$1000</button>
            </div>
            <div class="shop-item">
                <div>
                    <div style="color:#f00; font-weight:bold;">RPG 火箭筒</div>
                    <div style="font-size:12px; color:#aaa;">範圍爆炸，威力巨大</div>
                </div>
                <button onclick="buyWeapon('rpg', 2000)">$2000</button>
            </div>
            <div class="shop-item">
                <div>
                    <div style="color:#00ccff; font-weight:bold;">重型護甲 (+50)</div>
                    <div style="font-size:12px; color:#aaa;">減少受到的傷害</div>
                </div>
                <button onclick="buyItem('armor', 200)">$200</button>
            </div>
            <div class="shop-item">
                <div>
                    <div style="color:#fff; font-weight:bold;">醫療包 (+50 HP)</div>
                    <div style="font-size:12px; color:#aaa;">恢復生命值</div>
                </div>
                <button onclick="buyItem('health', 150)">$150</button>
            </div>
        </div>
        <button class="close-shop" onclick="toggleShop()">關閉商店 (B / ESC)</button>
    </div>

    <div id="menu">
        <h1>NIGHT SURVIVAL</h1>
        <div class="controls">
            <p><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 移動</p>
            <p><span class="key">按住左鍵</span> 攻擊</p>
            <p><span class="key">1</span><span class="key">2</span><span class="key">3</span> 切換武器</p>
            <p><span class="key">B</span> 商店</p>
        </div>
        <p style="margin-top: 30px; font-size: 20px; color: #aaa;">點擊畫面開始</p>
    </div>

<script>
    // --- 遊戲參數 ---
    const CONFIG = {
        walkSpeed: 12.0,
        jumpForce: 15.0,
        gravity: 30.0,
        mouseSensitivity: 0.002,
        friction: 8.0
    };

    const STATE = {
        hp: 100,
        maxHp: 100,
        armor: 0,
        money: 0,
        wave: 0,
        isPlaying: false,
        isShopOpen: false,
        canJump: false,
        currentSlot: 0,
        lastShotTime: 0,
        enemiesRemaining: 0,
        bossActive: false,
        isFiring: false,
        phase2: false, // 二階段標記
        bossRef: null  // 儲存BOSS引用
    };

    const WEAPON_DEFS = {
        ak:   { name: "AK-47",  damage: 35,   rate: 180,  range: 100, type: 'hitscan', color: 0xffaa00, model: 'rifle' },
        m249: { name: "M249",   damage: 25,   rate: 60,   range: 100, type: 'hitscan', color: 0x00ff00, model: 'm249' },
        rpg:  { name: "RPG",    damage: 800,  rate: 1200, range: 200, type: 'explosive', color: 0xff0000, model: 'rpg' },
        pistol:{ name: "Pistol",damage: 20,   rate: 300,  range: 60,  type: 'hitscan', color: 0xcccccc, model: 'pistol' },
        axe:  { name: "Axe",    damage: 150,  rate: 600,  range: 4,   type: 'melee',   color: 0xffffff, model: 'axe' },
        // 神器
        moon: { name: "MOON BLADE", damage: 2000, rate: 250, range: 8, type: 'melee', color: 0x00ffff, model: 'moon' }
    };

    let inventory = [WEAPON_DEFS.ak, WEAPON_DEFS.pistol, WEAPON_DEFS.axe];

    // --- Three.js 初始化 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101018); 
    scene.fog = new THREE.FogExp2(0x101018, 0.015);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- 燈光 ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    const moonLight = new THREE.DirectionalLight(0x6666ff, 0.8);
    moonLight.position.set(50, 100, 50);
    moonLight.castShadow = true;
    scene.add(moonLight);

    const flashLight = new THREE.SpotLight(0xffffee, 1.2, 60, Math.PI/6, 0.5, 1);
    camera.add(flashLight);
    camera.add(flashLight.target);
    flashLight.target.position.set(0, 0, -1);

    // --- 玩家與武器模型 ---
    const playerBody = new THREE.Group();
    scene.add(playerBody);
    playerBody.add(camera);
    camera.position.set(0, 1.7, 0);

    const weaponContainer = new THREE.Group();
    camera.add(weaponContainer);
    weaponContainer.position.set(0.4, -0.5, -0.6);

    const models = {};

    // 基礎武器模型
    const gRifle = new THREE.Group();
    gRifle.add(new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 1), new THREE.MeshStandardMaterial({color:0x8B4513})));
    gRifle.add(new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 1.2), new THREE.MeshStandardMaterial({color:0x111111})).translateZ(-0.2));
    models['rifle'] = gRifle; weaponContainer.add(gRifle);

    const gM249 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 1.0), new THREE.MeshStandardMaterial({color:0x333333}));
    models['m249'] = gM249; weaponContainer.add(gM249);

    const gRPG = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.5, 8), new THREE.MeshStandardMaterial({color:0x556B2F}));
    gRPG.rotation.x = Math.PI/2;
    models['rpg'] = gRPG; weaponContainer.add(gRPG);

    const gPistol = new THREE.Group();
    gPistol.add(new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.1, 0.4), new THREE.MeshStandardMaterial({color:0x888})));
    models['pistol'] = gPistol; weaponContainer.add(gPistol);

    const gAxe = new THREE.Group();
    const axeHandle = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.2), new THREE.MeshStandardMaterial({color:0x8B4513}));
    axeHandle.rotation.x = Math.PI/2; axeHandle.position.z = 0.2;
    const axeBlade = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.05, 0.3), new THREE.MeshStandardMaterial({color:0xCCCCCC}));
    axeBlade.position.z = -0.4; axeBlade.rotation.y = Math.PI/4;
    gAxe.add(axeHandle); gAxe.add(axeBlade);
    gAxe.position.set(-0.2, 0, 0); 
    models['axe'] = gAxe; weaponContainer.add(gAxe);

    // --- 月牙之刃 (Moon Blade) ---
    const gMoon = new THREE.Group();
    // 使用 RingGeometry 製作彎月
    const moonGeo = new THREE.RingGeometry(0.3, 0.5, 32, 1, 0, Math.PI * 1.2);
    const moonMat = new THREE.MeshStandardMaterial({ 
        color: 0x00ffff, 
        emissive: 0x00ffff, 
        emissiveIntensity: 2.0,
        side: THREE.DoubleSide
    });
    const moonMesh = new THREE.Mesh(moonGeo, moonMat);
    moonMesh.position.set(0, 0, -0.5);
    moonMesh.rotation.z = Math.PI / 4;
    
    const moonHandle = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.8), new THREE.MeshStandardMaterial({color:0xffffff}));
    moonHandle.rotation.x = Math.PI/2;
    moonHandle.position.set(0.1, -0.2, 0);

    gMoon.add(moonMesh);
    gMoon.add(moonHandle);
    gMoon.position.set(-0.2, -0.1, 0);
    models['moon'] = gMoon; weaponContainer.add(gMoon);

    // --- 地圖 ---
    const matFloor = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), matFloor);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    let obstacles = [];
    const matBox = new THREE.MeshStandardMaterial({ color: 0x444444 });
    function createMap() {
        for(let i=0; i<50; i++) {
            const h = Math.random() * 6 + 2;
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(3, h, 3), matBox);
            mesh.position.set((Math.random()-0.5)*160, h/2, (Math.random()-0.5)*160);
            if (mesh.position.length() < 20) continue;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            obstacles.push(mesh);
        }
    }
    createMap();

    // 宇宙星空 (二階段用)
    const starsGeometry = new THREE.BufferGeometry();
    const starsCount = 2000;
    const posArray = new Float32Array(starsCount * 3);
    for(let i = 0; i < starsCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 600;
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const starsMaterial = new THREE.PointsMaterial({size: 0.8, color: 0xffffff});
    const starField = new THREE.Points(starsGeometry, starsMaterial);
    starField.visible = false;
    scene.add(starField);

    // --- 敵人系統 ---
    let enemies = [];
    let bossProjectiles = [];
    
    const matZombieGreen = new THREE.MeshStandardMaterial({ color: 0x55aa55 });
    const matBossRed = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 });
    const matWing = new THREE.MeshStandardMaterial({ color: 0x220000, side: THREE.DoubleSide });

    function spawnEnemy(isBoss = false) {
        if (STATE.phase2 && !isBoss) return; // 二階段不生成小怪

        const enemyGroup = new THREE.Group();
        const scale = isBoss ? 3.5 : 1.0;
        
        // 身體
        const bodyMat = isBoss ? matBossRed : matZombieGreen;
        const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(0.6*scale, 1.0*scale, 0.4*scale), bodyMat);
        bodyMesh.position.y = (1.0*scale) / 2;
        bodyMesh.castShadow = true;
        enemyGroup.add(bodyMesh);

        // 頭部
        const headGroup = new THREE.Group();
        headGroup.position.y = (1.0*scale) + (0.3*scale);
        const skullMesh = new THREE.Mesh(new THREE.BoxGeometry(0.6*scale, 0.6*scale, 0.6*scale), bodyMat);
        headGroup.add(skullMesh);
        
        // 眼睛
        const eyeMat = new THREE.MeshStandardMaterial({ color: isBoss ? 0xffff00 : 0xffffff, emissive: isBoss ? 0xff0000 : 0x000000 });
        const leftEye = new THREE.Mesh(new THREE.BoxGeometry(0.15*scale, 0.15*scale, 0.05), eyeMat);
        leftEye.position.set(-0.15*scale, 0.1*scale, 0.31*scale);
        headGroup.add(leftEye);
        const rightEye = new THREE.Mesh(new THREE.BoxGeometry(0.15*scale, 0.15*scale, 0.05), eyeMat);
        rightEye.position.set(0.15*scale, 0.1*scale, 0.31*scale);
        headGroup.add(rightEye);

        enemyGroup.add(headGroup);

        // BOSS 特有：惡魔翅膀
        if (isBoss) {
            const wingGeo = new THREE.BoxGeometry(1.5*scale, 0.8*scale, 0.1*scale);
            const leftWing = new THREE.Mesh(wingGeo, matWing);
            leftWing.position.set(-0.8*scale, 0.8*scale, -0.3*scale);
            leftWing.rotation.z = 0.2;
            leftWing.name = "wingL";
            enemyGroup.add(leftWing);

            const rightWing = new THREE.Mesh(wingGeo, matWing);
            rightWing.position.set(0.8*scale, 0.8*scale, -0.3*scale);
            rightWing.rotation.z = -0.2;
            rightWing.name = "wingR";
            enemyGroup.add(rightWing);
            
            STATE.bossRef = enemyGroup;
        }

        // 位置
        const angle = Math.random() * Math.PI * 2;
        const dist = isBoss ? 60 : (30 + Math.random() * 40);
        enemyGroup.position.set(Math.sin(angle)*dist, 0, Math.cos(angle)*dist);

        enemyGroup.userData = {
            hp: isBoss ? 10000 : 100, 
            maxHp: isBoss ? 10000 : 100,
            speed: isBoss ? 6.0 : (3.0 + Math.random() * 4),
            damage: isBoss ? 25 : 5,
            isBoss: isBoss,
            score: isBoss ? 50000 : 100,
            attackCooldown: 0
        };

        scene.add(enemyGroup);
        enemies.push(enemyGroup);
        if(!isBoss) STATE.enemiesRemaining++;
    }

    function startWave(waveNum) {
        STATE.wave = waveNum;
        document.getElementById('wave-val').innerText = waveNum;
        const announce = document.getElementById('wave-announce');
        announce.innerText = waveNum === 3 ? "FINAL BOSS" : `WAVE ${waveNum}`;
        announce.style.opacity = 1;
        setTimeout(() => announce.style.opacity = 0, 3000);

        if (waveNum === 3) {
            spawnEnemy(true);
            STATE.bossActive = true;
            document.getElementById('boss-bar-container').style.display = 'block';
            // 初始小怪
            for(let i=0; i<30; i++) spawnEnemy();
        } else {
            let count = waveNum === 1 ? 10 : 25;
            for(let i=0; i<count; i++) spawnEnemy();
        }
    }

    // --- 二階段轉場 ---
    function enterPhaseTwo() {
        if (STATE.phase2) return;
        STATE.phase2 = true;

        // 視覺特效
        const flash = document.getElementById('phase2-flash');
        flash.style.opacity = 1;
        setTimeout(() => flash.style.opacity = 0, 2000);

        document.getElementById('wave-announce').innerText = "VOID REALM";
        document.getElementById('wave-announce').style.opacity = 1;
        document.getElementById('wave-announce').style.color = "#00ffff";
        document.getElementById('wave-announce').style.textShadow = "0 0 20px #00ffff";

        // 1. 殺死所有小怪
        for (let i = enemies.length - 1; i >= 0; i--) {
            if (!enemies[i].userData.isBoss) {
                scene.remove(enemies[i]);
                enemies.splice(i, 1);
            }
        }

        // 2. 摧毀建築
        obstacles.forEach(obs => scene.remove(obs));
        obstacles = [];

        // 3. 環境改變
        scene.fog = new THREE.FogExp2(0x000000, 0.002);
        scene.background = new THREE.Color(0x000000);
        starField.visible = true;
        
        // 地板變成透明能量網
        floor.material = new THREE.MeshBasicMaterial({ 
            color: 0x0044aa, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.3 
        });

        // 4. 更換武器
        inventory = [WEAPON_DEFS.moon];
        STATE.currentSlot = 0;
        
        // 更新 UI
        const slots = document.getElementById('weapon-slots');
        slots.innerHTML = `<div class="slot active" id="slot-0"><span>∞</span><div class="w-name" style="color:#0ff; text-shadow:0 0 5px #0ff">MOON<br>BLADE</div></div>`;
        
        switchSlot(0);
        alert("BOSS 吸收了所有靈魂！世界崩塌！\n你獲得了 [虛幻月牙之刃]");
    }

    // --- 輸入控制 ---
    const input = { w: false, a: false, s: false, d: false };
    const velocity = new THREE.Vector3();
    const menu = document.getElementById('menu');
    const shopMenu = document.getElementById('shop-menu');

    document.addEventListener('mousedown', (e) => {
        if (STATE.isPlaying && !STATE.isShopOpen && e.button === 0) STATE.isFiring = true;
        else if (!STATE.isPlaying && !STATE.isShopOpen) document.body.requestPointerLock();
    });

    document.addEventListener('mouseup', () => STATE.isFiring = false);

    document.addEventListener('pointerlockchange', () => {
        if (document.pointerLockElement === document.body) {
            STATE.isPlaying = true;
            STATE.isShopOpen = false;
            menu.style.display = 'none';
            shopMenu.style.display = 'none';
        } else {
            if (!STATE.isShopOpen) {
                STATE.isPlaying = false;
                STATE.isFiring = false;
                menu.style.display = 'flex';
            }
        }
    });

    function toggleShop() {
        // 二階段禁止商店
        if (STATE.phase2) return; 
        if (STATE.isShopOpen) {
            STATE.isShopOpen = false;
            shopMenu.style.display = 'none';
            document.body.requestPointerLock();
        } else {
            STATE.isShopOpen = true;
            STATE.isPlaying = false;
            STATE.isFiring = false;
            document.exitPointerLock();
            shopMenu.style.display = 'flex';
            updateShopUI();
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.code === 'KeyB') toggleShop();
        if (!STATE.isPlaying) return;
        switch(e.code) {
            case 'KeyW': input.w = true; break;
            case 'KeyS': input.s = true; break;
            case 'KeyA': input.a = true; break;
            case 'KeyD': input.d = true; break;
            case 'Space': if(STATE.canJump) { velocity.y = CONFIG.jumpForce; STATE.canJump = false; } break;
            case 'Digit1': if(inventory[0]) switchSlot(0); break;
            case 'Digit2': if(inventory[1]) switchSlot(1); break;
            case 'Digit3': if(inventory[2]) switchSlot(2); break;
        }
    });

    document.addEventListener('keyup', (e) => {
        switch(e.code) {
            case 'KeyW': input.w = false; break;
            case 'KeyS': input.s = false; break;
            case 'KeyA': input.a = false; break;
            case 'KeyD': input.d = false; break;
        }
    });

    document.addEventListener('mousemove', (e) => {
        if (!STATE.isPlaying) return;
        playerBody.rotation.y -= e.movementX * CONFIG.mouseSensitivity;
        camera.rotation.x -= e.movementY * CONFIG.mouseSensitivity;
        camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
    });

    // --- 武器系統 ---
    function switchSlot(idx) {
        STATE.currentSlot = idx;
        STATE.isFiring = false;
        if(!STATE.phase2) {
            document.querySelectorAll('.slot').forEach((el, i) => el.classList.toggle('active', i === idx));
        }
        const currentWep = inventory[idx];
        for (const key in models) models[key].visible = false;
        if (models[currentWep.model]) {
            models[currentWep.model].visible = true;
            models[currentWep.model].position.z = 0; 
            models[currentWep.model].rotation.x = (currentWep.model === 'rpg') ? Math.PI/2 : 0;
            if(currentWep.model === 'axe' || currentWep.model === 'moon') {
                models[currentWep.model].rotation.x = 0;
                models[currentWep.model].position.set(-0.2, -0.1, 0);
            }
        }
    }

    function processShooting() {
        if (!STATE.isFiring) return;
        const now = Date.now();
        const weapon = inventory[STATE.currentSlot];
        if (now - STATE.lastShotTime < weapon.rate) return;
        STATE.lastShotTime = now;

        const model = models[weapon.model];
        if (model) {
            if (weapon.type === 'melee') {
                // 揮砍動畫
                model.rotation.x = -Math.PI / 2; 
                model.rotation.y = -Math.PI / 2;
                setTimeout(() => {
                    model.rotation.x = 0;
                    if(weapon.model === 'moon') model.rotation.z = Math.PI/4; // Reset moon rotation
                    model.rotation.y = 0;
                }, 150);
            } else {
                model.position.z += 0.15;
                setTimeout(() => model.position.z -= 0.15, 80);
                const flash = new THREE.PointLight(weapon.color, 1, 5);
                flash.position.set(0.5, -0.2, -1);
                camera.add(flash);
                setTimeout(() => camera.remove(flash), 50);
                document.body.classList.add('recoil');
                setTimeout(() => document.body.classList.remove('recoil'), 80);
            }
        }

        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

        if (weapon.type === 'explosive') {
            const intersects = raycaster.intersectObjects([...enemies, floor, ...obstacles], true);
            if (intersects.length > 0) createExplosion(intersects[0].point, weapon.damage);
        } else {
            if (weapon.type === 'melee') raycaster.far = weapon.range;
            else raycaster.far = 1000;

            const intersects = raycaster.intersectObjects(enemies, true);
            if (intersects.length > 0) {
                const hit = intersects[0];
                let target = hit.object;
                while(target.parent && !target.userData.hp) target = target.parent;

                if (target.userData.hp) {
                    // 擊退
                    const pushDir = hit.point.clone().sub(playerBody.position).normalize();
                    target.position.add(pushDir.multiplyScalar(weapon.type === 'melee' ? 2.0 : 0.2));
                    damageEnemy(target, weapon.damage);
                    
                    // 月牙之刃特效
                    if(weapon.model === 'moon') {
                        const slashEffect = new THREE.PointLight(0x00ffff, 2, 5);
                        slashEffect.position.copy(hit.point);
                        scene.add(slashEffect);
                        setTimeout(()=>scene.remove(slashEffect), 100);
                    }
                }
            }
        }
    }

    function createExplosion(point, damage) {
        const light = new THREE.PointLight(0xffaa00, 5, 20);
        light.position.copy(point);
        light.position.y += 1;
        scene.add(light);
        setTimeout(() => scene.remove(light), 200);

        enemies.forEach(enemy => {
            if (enemy.position.distanceTo(point) < 10) {
                damageEnemy(enemy, damage);
                const dir = enemy.position.clone().sub(point).normalize();
                enemy.position.add(dir.multiplyScalar(2));
            }
        });
    }

    function damageEnemy(enemy, dmg) {
        enemy.userData.hp -= dmg;
        if (enemy.userData.isBoss) {
            const pct = Math.max(0, (enemy.userData.hp / enemy.userData.maxHp) * 100);
            document.getElementById('boss-hp-bar').style.width = pct + '%';
            
            // 觸發二階段
            if (!STATE.phase2 && pct <= 50) {
                enterPhaseTwo();
            }
        }

        if (enemy.userData.hp <= 0) {
            killEnemy(enemy);
        } else {
            enemy.traverse((child) => {
                if(child.isMesh && child.material && child.material.emissive) child.material.emissive.setHex(0xffffff);
            });
            setTimeout(() => {
                enemy.traverse((child) => {
                    if(child.isMesh && child.material && child.material.emissive) {
                        child.material.emissive.setHex(enemy.userData.isBoss ? 0x330000 : 0x000000);
                        if(child.material.color.getHex() === 0x00ffff) child.material.emissive.setHex(0x00ffff); // Moon blade
                    }
                });
            }, 50);
        }
    }

    function killEnemy(enemy) {
        if (!enemies.includes(enemy)) return;
        scene.remove(enemy);
        enemies.splice(enemies.indexOf(enemy), 1);
        if(!enemy.userData.isBoss) STATE.enemiesRemaining--;
        
        addMoney(enemy.userData.score);

        if (enemy.userData.isBoss) {
            STATE.bossActive = false;
            document.getElementById('boss-bar-container').style.display = 'none';
            document.getElementById('wave-announce').innerText = "LEGENDARY VICTORY";
            document.getElementById('wave-announce').style.opacity = 1;
            document.getElementById('wave-announce').style.color = "#ffd700";
            setTimeout(() => alert("你斬殺了惡魔，拯救了宇宙！"), 1000);
        } else {
            // 波數邏輯
            if (STATE.enemiesRemaining <= 0 && !STATE.bossActive && STATE.wave < 3) {
                setTimeout(() => startWave(STATE.wave + 1), 2000);
            }
        }
    }

    function addMoney(amount) {
        STATE.money += amount;
        document.getElementById('money-val').innerText = '$' + STATE.money;
        updateShopUI();
    }

    function updateShopUI() {
        if(STATE.phase2) return;
        const currentMain = inventory[0].name;
        const btnM249 = document.querySelector('button[onclick*="m249"]');
        const btnRPG = document.querySelector('button[onclick*="rpg"]');
        btnM249.disabled = STATE.money < 1000 || currentMain === 'M249';
        btnRPG.disabled = STATE.money < 2000 || currentMain === 'RPG';
    }

    window.buyWeapon = function(type, cost) {
        if (STATE.money < cost) return;
        if (type === 'm249') inventory[0] = WEAPON_DEFS.m249;
        else if (type === 'rpg') inventory[0] = WEAPON_DEFS.rpg;
        document.getElementById('name-0').innerText = inventory[0].name;
        STATE.money -= cost;
        document.getElementById('money-val').innerText = '$' + STATE.money;
        if (STATE.currentSlot === 0) switchSlot(0);
        updateShopUI();
    };

    window.buyItem = function(item, cost) {
        if (STATE.money < cost) return;
        if (item === 'health') STATE.hp = Math.min(100, STATE.hp + 50);
        else if (item === 'armor') STATE.armor = Math.min(100, STATE.armor + 50);
        STATE.money -= cost;
        document.getElementById('money-val').innerText = '$' + STATE.money;
        updateHUD();
    };

    function updateHUD() {
        document.getElementById('hp-val').innerText = Math.floor(STATE.hp);
        document.getElementById('armor-val').innerText = Math.floor(STATE.armor);
    }

    // --- BOSS 技能 ---
    function updateBoss(boss, delta) {
        // 翅膀扇動
        const wingL = boss.getObjectByName("wingL");
        const wingR = boss.getObjectByName("wingR");
        if(wingL && wingR) {
            const flap = Math.sin(Date.now() * 0.005) * 0.3;
            wingL.rotation.y = -flap;
            wingR.rotation.y = flap;
        }

        // 投射物技能
        boss.userData.attackCooldown -= delta;
        if (boss.userData.attackCooldown <= 0) {
            boss.userData.attackCooldown = 2.0; // 2秒發射一次
            
            const projectile = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xff0000 })
            );
            projectile.position.copy(boss.position);
            projectile.position.y += 3; // 從頭頂發射
            
            // 計算方向
            const dir = new THREE.Vector3().subVectors(playerBody.position, projectile.position).normalize();
            projectile.userData = { velocity: dir.multiplyScalar(20), life: 5.0 }; // 速度 20
            
            scene.add(projectile);
            bossProjectiles.push(projectile);
        }
    }

    // --- 主循環 ---
    const clock = new THREE.Clock();

    function updatePhysics(delta) {
        const forward = Number(input.w) - Number(input.s);
        const side = Number(input.d) - Number(input.a);

        if (input.w || input.s) velocity.z -= forward * CONFIG.walkSpeed * delta * 5.0;
        if (input.a || input.d) velocity.x += side * CONFIG.walkSpeed * delta * 5.0;

        velocity.x -= velocity.x * CONFIG.friction * delta;
        velocity.z -= velocity.z * CONFIG.friction * delta;

        playerBody.translateX(velocity.x * delta);
        playerBody.translateZ(velocity.z * delta);

        velocity.y -= CONFIG.gravity * delta;
        playerBody.position.y += velocity.y * delta;

        if (playerBody.position.y < 0) {
            playerBody.position.y = 0;
            velocity.y = 0;
            STATE.canJump = true;
        }
    }

    function updateGameLogic(delta) {
        // 無限刷怪邏輯 (BOSS戰一階段)
        if (STATE.wave === 3 && !STATE.phase2 && enemies.length < 60) {
            if (Math.random() < 0.05) spawnEnemy(); // 快速補充
        }

        // 敵人行為
        enemies.forEach(enemy => {
            enemy.lookAt(playerBody.position.x, enemy.position.y, playerBody.position.z);
            enemy.translateZ(enemy.userData.speed * delta);

            if (enemy.userData.isBoss) updateBoss(enemy, delta);

            const dist = enemy.position.distanceTo(playerBody.position);
            if (dist < (enemy.userData.isBoss ? 4.0 : 2.0)) {
                if (Math.random() < 0.05) takeDamage(enemy.userData.damage);
            }
        });

        // BOSS 投射物
        for (let i = bossProjectiles.length - 1; i >= 0; i--) {
            const p = bossProjectiles[i];
            p.position.add(p.userData.velocity.clone().multiplyScalar(delta));
            p.userData.life -= delta;

            // 碰撞檢測 (玩家)
            if (p.position.distanceTo(playerBody.position) < 1.5) {
                takeDamage(20);
                scene.remove(p);
                bossProjectiles.splice(i, 1);
                continue;
            }

            // 移除過期
            if (p.userData.life <= 0) {
                scene.remove(p);
                bossProjectiles.splice(i, 1);
            }
        }
    }

    function takeDamage(amount) {
        let actualDmg = amount;
        if (STATE.armor > 0) {
            STATE.armor -= amount * 0.5;
            actualDmg = amount * 0.5;
            if (STATE.armor < 0) STATE.armor = 0;
        }
        STATE.hp -= actualDmg;
        updateHUD();
        document.body.style.boxShadow = "inset 0 0 50px rgba(255,0,0,0.5)";
        setTimeout(() => document.body.style.boxShadow = "none", 100);
        if (STATE.hp <= 0) {
            STATE.hp = 0;
            STATE.isPlaying = false;
            document.exitPointerLock();
            alert("GAME OVER");
            location.reload();
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        if (STATE.isPlaying) {
            const delta = Math.min(clock.getDelta(), 0.1);
            updatePhysics(delta);
            updateGameLogic(delta);
            processShooting();
        } else {
            clock.getDelta();
        }
        renderer.render(scene, camera);
    }

    switchSlot(0);
    startWave(1);
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
